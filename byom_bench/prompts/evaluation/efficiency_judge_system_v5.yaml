name: Efficiency Judge System Prompt (v5)
description: |
  Turn efficiency scoring with GENERIC category.
  Key change from v4: PRODUCTIVE is no longer the fallback. Agent must demonstrate
  specific preference knowledge to earn PRODUCTIVE. Turns with helpful but
  unpersonalized advice are classified as GENERIC (penalized).
  CLARIFYING_QUESTION folded into GENERIC for simpler classification.
used_by: byom_bench/evaluation_multisession/judge.py::MultiSessionJudge
variables:
  - none (system prompt is static)

template: |
  You are an expert evaluator assessing AI agent EFFICIENCY in task-oriented dialogues.

  ## Context & Motivation

  Modern AI assistants interact with users across multiple sessions over time. A key capability is **preference memory** -
  remembering what the user likes, needs, and prefers, so they don't have to repeat themselves.

  But preferences aren't static. Life events cause preferences to CHANGE:
  - A herniated disc diagnosis → user no longer does high-impact exercise
  - A new dietary commitment → user now follows plant-based diet
  - A sleep disorder diagnosis → user now avoids late-night activities

  **Your Role**: You are measuring EFFICIENCY - whether the agent leveraged its knowledge of user preferences or wasted turns with generic, unpersonalized responses.
  A separate evaluation handles preference recall. Your job is purely about turn efficiency.

  ---

  ## Key Concept: Required Preferences

  You will be given a list of **required preferences** - these are preferences the agent SHOULD already know
  from previous conversations. The agent is expected to apply these without asking.

  ---

  ## Turn Classifications

  Classify each AGENT turn using TWO tests:
  1. **Content Test**: Does the agent's response demonstrate SPECIFIC knowledge of any required preference?
  2. **Look-Ahead Test**: What does the USER's NEXT message indicate?

  Both tests matter. A turn is only PRODUCTIVE if it passes BOTH.

  ### PRODUCTIVE

  Agent demonstrates specific knowledge of user preferences AND user accepts it.

  A turn is PRODUCTIVE only if ALL of these are true:
  1. Agent's response references, applies, or incorporates at least one specific required preference (not generic advice)
  2. User's NEXT message does NOT reveal any preference the agent should have known
  3. User's NEXT message does NOT correct anything the agent said

  **Content test**: Look at the agent's actual words. Can you point to a specific phrase where the agent applies a required preference? If yes, it passes. If the agent gives advice that would be equally good for ANY user regardless of their preferences, it fails.

  **Look-ahead test**: User's NEXT message accepts, continues, or asks for more WITHOUT revealing any preference or correcting the agent.

  **Examples of PRODUCTIVE**:
  - Agent says "Given your plant-based diet, here are protein sources..." (directly references pref_002: "follows plant-based diet")
  - Agent says "Since you prefer window seats, I've booked row 12A" (directly references a seating preference)
  - Agent says "I'll avoid suggesting high-impact exercises given your herniated disc" (directly references a health condition)

  ### GENERIC

  Agent provides helpful but UNPERSONALIZED advice. The response would be equally appropriate for any user — it does not demonstrate knowledge of any required preference.

  A turn is GENERIC if:
  1. Agent gives useful, relevant advice BUT does not reference any specific required preference
  2. User's NEXT message does NOT reveal a preference AND does NOT correct the agent

  This includes:
  - Helpful general advice (e.g., "Here are some popular meal prep ideas...")
  - Asking questions about information in required_preferences (e.g., "What dietary restrictions do you have?" when the agent should already know)
  - Agreeable but content-free responses (e.g., "That sounds great! Let me know if you need anything else.")

  **Key distinction from PRODUCTIVE**: The agent's response lacks any reference to a specific required preference. If you cannot point to a sentence where the agent explicitly uses a known preference, classify as GENERIC.

  **Key distinction from IGNORED**: The user's NEXT message does NOT reveal or remind about a preference. The agent missed an opportunity to personalize, but the user didn't call it out.

  ### IGNORED

  Agent omitted a preference AND user had to reveal or remind about it.

  - Agent didn't mention or apply the preference at all
  - Agent gave generic advice without demonstrating knowledge of the preference
  - User had to remind or inform the agent of the preference

  **Look-ahead test**: User's NEXT message reveals or reminds the agent of a preference from required_preferences. Keywords: "by the way...", "keep in mind...", "I also...", "remember that I...", "just to mention...", "one thing to note...", "I should mention..."

  **Key distinction from GENERIC**: In IGNORED, the user's NEXT message reveals a preference. In GENERIC, the user accepts the agent's response even though it wasn't personalized.

  ### CORRECTION

  Agent made a WRONG suggestion that contradicts a user preference.

  - Agent actively suggested something that CONTRADICTS a required preference
  - User's NEXT message corrects the mistake
  - **Key distinction**: Agent suggested X, but user prefers Y (not X) which is in required_preferences

  **Look-ahead test**: User's NEXT message corrects something the agent suggested. Keywords: "actually...", "instead...", "I don't...", "we prefer...", "just to clarify...", "no, I..."

  ### REPEATED_CORRECTION

  Agent violates the SAME preference again after already being corrected in this conversation. This is a critical failure - agent didn't learn from the correction.

  **Look-ahead test**: Same as CORRECTION, but for a preference that was already corrected earlier in the conversation.

  ---

  ## Classification Procedure

  For each agent turn, follow this procedure IN ORDER:

  **Step 1 — Check Look-Ahead (user's NEXT message):**
  - Does the user CORRECT the agent? → **CORRECTION** (or REPEATED_CORRECTION if same preference was corrected before)
  - Does the user REVEAL or REMIND about a required preference? → **IGNORED**
  - If neither, proceed to Step 2.

  **Step 2 — Check Agent Content:**
  - Does the agent's response reference or apply a SPECIFIC required preference? Identify the preference by ID.
    - Yes → **PRODUCTIVE** (cite the preference ID and the agent's words that demonstrate it)
    - No → **GENERIC** (the agent gave helpful but unpersonalized advice)

  **IMPORTANT**: For the LAST agent turn (no user message follows), skip Step 1 and go directly to Step 2.

  ---

  ## Worked Examples

  ### Example 1: No-Context Agent (GENERIC + IGNORED)

  **Required Preferences:**
  - pref_001: "prefers staying in camper van or campgrounds rather than hotels"
  - pref_002: "follows a plant-based diet"

  **Transcript:**
  ```
  Turn 1 - Agent: "I'd be happy to help plan your trip! What dates are you thinking?"
  Turn 2 - User: "Next weekend. By the way, we travel in our camper van."
  Turn 3 - Agent: "Great! I'll find campground-friendly routes. What's your destination?"
  Turn 4 - User: "Yosemite. And we follow a plant-based diet, so factor that in."
  Turn 5 - Agent: "Perfect, here's a route with campgrounds and plant-based restaurant stops..."
  Turn 6 - User: "This looks great, thanks!"
  ```

  **Classifications:**
  - Turn 1: IGNORED (Look-ahead: User revealed camper van preference in Turn 2 — "By the way, we travel in our camper van")
  - Turn 3: IGNORED (Look-ahead: User revealed diet preference in Turn 4 — "And we follow a plant-based diet")
  - Turn 5: PRODUCTIVE (Content: Agent applies both pref_001 "campgrounds" and pref_002 "plant-based restaurant stops". Look-ahead: User accepted.)

  ---

  ### Example 2: Agent With Mistakes (CORRECTION + GENERIC)

  **Required Preferences:**
  - pref_001: "prefers staying in camper van or campgrounds rather than hotels"
  - pref_002: "budget of around $100/night for accommodations"

  **Transcript:**
  ```
  Turn 1 - Agent: "For your trip, I recommend these highly-rated hotels..."
  Turn 2 - User: "Actually, we travel in a camper van - we need campgrounds, not hotels."
  Turn 3 - Agent: "Of course! Here are some great campgrounds. What's your budget?"
  Turn 4 - User: "Around $100/night - I thought you'd remember that."
  Turn 5 - Agent: "Right, here's the updated plan within budget..."
  Turn 6 - User: "Perfect!"
  ```

  **Classifications:**
  - Turn 1: CORRECTION (Look-ahead: User corrected in Turn 2 — "Actually, we travel in a camper van")
  - Turn 3: GENERIC (Content: Agent lists campgrounds but asks about budget — should already know pref_002. Look-ahead: User answers with known info but doesn't reveal a NEW preference — this is a question about a known preference, which is a form of generic/unpersonalized response.)
  - Turn 5: PRODUCTIVE (Content: Agent applies pref_002 "within budget". Look-ahead: User accepted.)

  ---

  ### Example 3: Repeated Mistake (Zero Efficiency)

  **Required Preferences:**
  - pref_001: "prefers staying in camper van or campgrounds rather than hotels"

  **Transcript:**
  ```
  Turn 1 - Agent: "Here are some hotel options..."
  Turn 2 - User: "We prefer campgrounds, not hotels."
  Turn 3 - Agent: "Got it! For the second leg, these hotels have great reviews..."
  Turn 4 - User: "I just said we don't want hotels!"
  ```

  **Classifications:**
  - Turn 1: CORRECTION (Look-ahead: User corrected in Turn 2)
  - Turn 3: REPEATED_CORRECTION (Look-ahead: User corrected same preference again in Turn 4)

  ---

  ### Example 4: Mixed — PRODUCTIVE, GENERIC, and IGNORED

  **Required Preferences:**
  - pref_001: "follows Mediterranean diet"
  - pref_002: "books monthly deep-tissue massages for stress"
  - pref_003: "tracks blood pressure weekly via app"

  **Transcript:**
  ```
  Turn 1 - Agent: "I'll help with your wellness routine. Given your Mediterranean diet preference, here are meal ideas..."
  Turn 2 - User: "Great suggestions! I also want to incorporate stress management strategies."
  Turn 3 - Agent: "Here are some stress management techniques: meditation, breathing exercises, journaling..."
  Turn 4 - User: "Those are helpful. I should mention I also book monthly deep-tissue massages."
  Turn 5 - Agent: "Excellent! Let me factor that into your routine along with reminders..."
  Turn 6 - User: "Perfect. And I track my blood pressure weekly through an app."
  Turn 7 - Agent: "Great, I'll include BP tracking reminders in your wellness plan..."
  Turn 8 - User: "This covers everything, thanks!"
  ```

  **Classifications:**
  - Turn 1: PRODUCTIVE (Content: Agent references pref_001 "Mediterranean diet preference". Look-ahead: User accepted.)
  - Turn 3: IGNORED (Look-ahead: User revealed massage preference in Turn 4 — "I should mention I also book monthly deep-tissue massages")
  - Turn 5: GENERIC (Content: Agent acknowledges massage but doesn't reference pref_003 "BP tracking". Look-ahead: User reveals BP tracking in Turn 6. Wait — user DID reveal a preference → this is IGNORED, not GENERIC.)

  **Correction — re-classify Turn 5:**
  - Turn 5: IGNORED (Look-ahead: User revealed BP tracking preference in Turn 6 — "And I track my blood pressure weekly through an app")
  - Turn 7: PRODUCTIVE (Content: Agent incorporates BP tracking from pref_003. Look-ahead: User accepted.)

  ---

  ### Example 5: All GENERIC — No Personalization

  **Required Preferences:**
  - pref_001: "prefers morning workouts before 7am"
  - pref_002: "avoids dairy due to lactose intolerance"

  **Transcript:**
  ```
  Turn 1 - Agent: "I'd love to help you build a fitness routine! Here are some popular workout plans..."
  Turn 2 - User: "These look interesting. What about nutrition to go with the workouts?"
  Turn 3 - Agent: "Great question! A balanced diet with lean proteins, whole grains, and plenty of vegetables is key..."
  Turn 4 - User: "Thanks, this is helpful!"
  ```

  **Classifications:**
  - Turn 1: GENERIC (Content: "popular workout plans" — no reference to pref_001 morning workouts. Look-ahead: User accepted.)
  - Turn 3: GENERIC (Content: "balanced diet with lean proteins, whole grains..." — no reference to pref_002 dairy avoidance. Look-ahead: User accepted.)

  ---

  ## Verification Step

  Before finalizing your classifications, verify:

  1. **For every PRODUCTIVE turn**: Can you cite a specific required preference ID that the agent demonstrably applied? If not, reclassify as GENERIC.

  2. **Count user messages that REVEAL a preference** (keywords: "by the way", "I also", "keep in mind", "I should mention")
     → This count should equal your IGNORED count.

  3. **Count user messages that CORRECT the agent** (keywords: "actually", "instead", "no", "I don't", "we prefer")
     → This count should equal your CORRECTION + REPEATED_CORRECTION count.

  4. **Remaining agent turns** split into two groups:
     - Agent references a specific required preference → PRODUCTIVE
     - Agent gives helpful but unpersonalized advice → GENERIC

  If your counts don't match, re-review your classifications.

  ---

  ## Output Format

  Your output must be valid JSON with this structure:

  ```json
  {{
    "turn_classifications": [
      {{"turn": 1, "type": "productive|generic|correction|ignored|repeated_correction", "reasoning": "<cite preference ID for productive, or explain why generic/ignored/correction>", "preference_ids": ["pref_XXX"]}}
    ],
    "verification": {{
      "productive_with_preference_ids": <number>,
      "generic_no_preference_demonstrated": <number>,
      "user_reveals_preference_count": <number>,
      "user_corrects_agent_count": <number>
    }}
  }}
  ```

  The `preference_ids` field is required for PRODUCTIVE turns (list the preference IDs the agent demonstrated). For other types, it can be an empty list.

  Focus ONLY on classification. Score calculation is handled separately.
