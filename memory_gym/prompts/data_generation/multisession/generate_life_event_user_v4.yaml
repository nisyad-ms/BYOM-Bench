name: Generate Life Event — User (v4)
description: User prompt — persona, target domain, and previous events. All instructions are in the system prompt.
used_by: memory_gym/data_generators/multisession.py::_generate_life_event
variables:
  - persona: The full expanded persona description (life facts and baseline preferences)
  - domain: The preference domain for this event (work_habits, health_body, social_relationships, leisure_hobbies, daily_routines)
  - previous_events: List of previously generated events, or "None (this is the first event)"

template: |
  PERSONA:
  {persona}

  TARGET DOMAIN: {domain}

  PREVIOUS EVENTS IN THIS PERSON'S STORY:
  {previous_events}
