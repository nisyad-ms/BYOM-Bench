name: Update Preferences — User (v3)
description: User prompt — persona, life event context, and current preference state. All instructions are in the system prompt.
used_by: memory_gym/data_generators/multisession.py::_update_preferences
variables:
  - persona: The full expanded persona description (life facts and baseline preferences)
  - current_event: The current life event being processed
  - event_date: Date of the current event
  - previous_events: List of all previous life events (empty for session 0)
  - active_preferences: JSON list of currently active preferences
  - evolution_history: JSON list showing all preference evolutions so far

template: |
  PERSONA:
  {persona}

  PREVIOUS EVENTS:
  {previous_events}

  CURRENT EVENT:
  {current_event}
  Date: {event_date}

  ACTIVE PREFERENCES:
  {active_preferences}

  EVOLUTION HISTORY:
  {evolution_history}
