name: Generate Life Event (v2)
description: Generates a single life event for a specified domain. Events describe WHAT HAPPENED, not behavioral outcomes.
used_by: persona_gym/data_generators/multisession.py::_generate_life_event
variables:
  - persona: The full expanded persona description (includes domain facts and baseline preferences)
  - domain: The life domain for this event (work_education, health_wellness, travel_experiences, relationships_personal, hobbies_interests)
  - previous_events: List of previously generated events to build upon

template: |
  Generate a realistic life event for the specified domain that is personalized to this persona. The event should be significant enough to DRAMATICALLY change the user's preferences, habits, or priorities.

  PERSONA:
  {persona}

  TARGET DOMAIN: {domain}

  Use the domain facts AND baseline preferences from the persona above to personalize the event.

  PREVIOUS EVENTS IN THIS PERSON'S STORY:
  {previous_events}

  ═══════════════════════════════════════════════════════════════════════════════
  NARRATIVE COHERENCE: NATURAL CONNECTIONS OVER MONTHS, NOT TIGHT CHAINING
  ═══════════════════════════════════════════════════════════════════════════════
  
  Life events should feel like a coherent story unfolding over MONTHS, not a chain reaction of immediate consequences.
  
  GOOD COHERENCE (natural life progression over time):
  - Event 1 (Jan): "Diagnosed with early diabetes at annual checkup"
  - Event 2 (Apr): "Wife gets job offer in Portland, family considering relocation" 
    → Natural life event, loosely connected (health situation is background context)
  - Event 3 (Jul): "After settling into Portland, joined a local hiking group to stay active"
    → Builds on relocation, connects to health management
  
  BAD COHERENCE (too tight, immediate consequences):
  - Event 1: "Diagnosed with diabetes"
  - Event 2: "Due to diabetes, can't eat at favorite restaurants" ← Too immediate
  - Event 3: "Restaurant restrictions caused social isolation" ← Artificial chain
  
  GUIDELINES FOR NATURAL COHERENCE:
  1. Events can ACKNOWLEDGE previous events as background context
  2. Events should feel like MONTHS have passed, not days
  3. New events should introduce FRESH situations, not just extend consequences
  4. **Important** Cross-domain connections are encouraged (health affects work, family affects hobbies)
  5. Some events can be unrelated - not everything needs to connect
  6. Avoid phrases like "due to", "as a result of", "because of the previous..."
  
  THINK OF IT AS: "What might happen to this person 2-3 months later, given their life context?"
  NOT: "What is the immediate consequence of the last event?"

  DOMAIN DEFINITIONS (not exhaustive):
  - work_education: Career changes, job transitions, education, professional development, etc.
  - health_wellness: Physical/mental health, fitness, diet, medical conditions, etc.
  - travel_experiences: Travel style, transportation habits, commute changes, vacation preferences, etc.
  - relationships_personal: Family dynamics, romantic relationships, friendships, living arrangements, etc.
  - hobbies_interests: Hobbies, creative pursuits, entertainment preferences, leisure activities, etc.

  REQUIREMENTS:
  1. The event MUST belong to the "{domain}" domain
  2. The event must be plausible given the persona's background, age, and life context
  3. The event should create opportunities for DRAMATIC preference changes
  4. The event should be specific and concrete, not vague
  5. Include enough detail to understand the impact on daily life
  6. Natural connections to previous events are welcome, but avoid tight causal chaining

  ═══════════════════════════════════════════════════════════════════════════════
  EVENTS THAT FORCE REAL CHANGE (not just refinement)
  ═══════════════════════════════════════════════════════════════════════════════
  
  **IMPORTANT**: You are generating an EVENT (what happened), NOT the preference change.
  A separate prompt will determine how preferences evolve based on your event.
  
  Your event should be SIGNIFICANT enough to force preference changes. Two mechanisms:
  
  1. CONSTRAINTS (~50%): Events that PREVENT old behaviors
     - Health: diagnoses, injuries, new dietary requirements
     - Resources: budget cuts, time limitations, schedule conflicts
     - Circumstances: job demands, caregiving duties
  
  2. NEW PRIORITIES (~50%): Events that INTRODUCE new commitments
     - New relationships: partner's lifestyle, new baby, new pet
     - Discoveries: found a passion, joined a community, learned a skill
     - Upgrades: promotion, paid off debt, more free time

  EXAMPLES OF GOOD LIFE EVENTS BY DOMAIN:
  (✓ = new priority/positive, ✗ = constraint/challenging)
  
  NOTE: Describe WHAT HAPPENED, not the behavioral outcome.

  work_education:
  ✗ "Laid off after company downsizing; severance covers 3 months"
  ✓ "Promoted to VP of Engineering with a team of 40 reports"
  ✗ "New CEO mandated return-to-office 5 days a week starting next month"
  ✓ "Company announced permanent remote-first policy"
  ✗ "Transferred to the Tokyo office for a 2-year assignment"
  ✓ "Completed executive MBA after 3 years of evening classes"

  health_wellness:
  ✗ "Diagnosed with celiac disease after months of digestive issues"
  ✓ "Completed first marathon after a year of training"
  ✗ "Tore ACL during a pickup basketball game, surgery scheduled"
  ✓ "Started working with a personal trainer 3x per week"
  ✗ "Diagnosed with early-stage Type 2 diabetes at annual checkup"
  ✓ "Blood pressure normalized after 6 months of lifestyle changes"

  travel_experiences:
  ✗ "Experienced severe turbulence and emergency landing on a flight"
  ✓ "Got TSA PreCheck and Global Entry approved"
  ✗ "Car totaled in accident; insurance payout insufficient to replace"
  ✓ "Purchased a camper van for weekend adventures"
  ✗ "New role requires 50% travel across time zones"
  ✓ "Partner introduced them to backpacking on a trip to Yosemite"

  relationships_personal:
  ✗ "Spouse filed for divorce after 12 years of marriage"
  ✓ "Got engaged to partner of 3 years"
  ✗ "Elderly mother with dementia moved into the house"
  ✓ "Wife gave birth to their first child"
  ✗ "Partner accepted a job requiring opposite shift schedule"
  ✓ "Started dating someone who is deeply involved in local theater"

  hobbies_interests:
  ✗ "Developed severe tendinitis in wrist from guitar playing"
  ✓ "Took a woodworking class and built first piece of furniture"
  ✗ "Adopted two high-energy rescue dogs from a shelter"
  ✓ "Joined a local running club through a coworker"
  ✗ "Family staged an intervention about gaming habits"
  ✓ "Discovered pottery at a team offsite and signed up for classes"

  EXAMPLES OF BAD EVENTS (avoid these):

  ❌ INCLUDES BEHAVIORAL OUTCOME (let update_preferences handle this):
  - "Knee injury ended running career, must find low-impact alternatives"
    → Better: "Tore ACL during a half-marathon, requiring surgery"
  - "Developed fear of flying, now only drives or takes trains"
    → Better: "Experienced severe turbulence and emergency landing"
  - "Had first child, weekends now revolve around family activities"
    → Better: "Wife gave birth to their first child"

  ❌ TOO VAGUE:
  - "Moved to a new city" (why? what's different?)
  - "Things changed at work" (what specifically?)
  - "Had some health issues" (what kind?)
  - "Life got busy" (with what? why?)
  
  ❌ OVERUSED (avoid unless story demands it):
  - Relocation/moving (use sparingly - once per persona MAX)
  - Another medical diagnosis (vary the types of health events)
  - Another job loss (mix with positive career changes)

  OUTPUT FORMAT (JSON):
  {{
    "event": "Detailed description of what happened, personalized to this persona. Include relevant circumstances, timing, and people involved.",
    "domain": "{domain}"
  }}

  CRITICAL:
  - Output ONLY valid JSON
  - The "domain" field must be exactly "{domain}"
  - The event must be appropriate for the specified domain
  - The event must be personalized to the persona (consider their age, background, interests)
  - The event description should be self-contained with all relevant details
