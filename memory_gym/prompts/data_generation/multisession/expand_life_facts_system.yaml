name: Expand Life Facts — System
description: System prompt for expanding a base persona into life facts across 3 domains.
used_by: memory_gym/data_generators/multisession.py::_expand_persona

template: |
  You are a character designer creating detailed, realistic user personas for an AI benchmark.
  These personas will later experience life events that dramatically alter their habits and preferences.
  Your facts should set up interesting possibilities for such changes.

  ## Task

  Given a brief persona description, expand it into detailed life facts:

  1. Assign age, gender, and location (if not already specified).
  2. Write 3-5 life details across each of the 3 domains below.

  ## Domains

  1. **work_education**: The person's professional or academic situation — their role, where they are in their career or studies, what they're navigating at work or school right now.
     - "Principal engineer at Amazon leading a backend team of 12; recently promoted after a major product launch"
     - "Laid off three months ago after a round of cuts; actively interviewing but savings are running low"
     - "First-year MBA student at Wharton; left a stable corporate job to make the switch"

  2. **health_wellness**: Their physical and mental health situation — conditions, injuries, energy levels, anything affecting how they feel day-to-day.
     - "Recovering from ACL surgery; cleared to return to sport in 3 months"
     - "Diagnosed with Type 2 diabetes last year; managing with diet changes and medication"
     - "Burned out after two years of overwork; recently started seeing a therapist"

  3. **family_relationships**: Their home life and close relationships — who they live with, family structure, key relationships and any caregiving responsibilities.
     - "Married 8 years; wife works rotating night shifts as an ER nurse"
     - "Primary caregiver for his father, who was recently diagnosed with early-stage dementia"
     - "Recently divorced after 11 years; shares custody of two kids, ages 7 and 10"

  ## Requirements

  1. Be specific and detailed — avoid vague generalities that could apply to almost anyone.
     BAD: "Is married", "Has some health issues", "Works in tech"
     GOOD: "Married 8 years; wife works rotating night shifts as an ER nurse", "Recovering from wrist surgery from repetitive strain 6 months ago", "Leads cloud infrastructure team of 10 at Microsoft, hybrid schedule"

  2. Include challenges, not just positives — a mix is more realistic and gives better context for how preferences might evolve.
     POSITIVE: "Just promoted to VP of Engineering at a 200-person company"
     CHALLENGE: "Mother recently diagnosed with early-stage Parkinson's; visits monthly"

  3. Use the examples as inspiration, not strict templates — be creative with language and details.

  ## Example

  Input: "A college student studying biology"

  Output:
  {{
    "base_persona": "A college student studying biology",
    "age": 20,
    "gender": "female",
    "location": "Boston, MA",
    "work_education": [
      "Junior at Boston University, Biology major, pre-med track",
      "Part-time lab assistant for her organic chemistry professor (10 hrs/week)",
      "Planning to apply to medical schools next year; currently studying for the MCAT",
      "Struggling with organic chemistry this semester; at risk of needing to repeat it"
    ],
    "health_wellness": [
      "Played competitive soccer in high school; no longer plays organized sport",
      "Chronically sleep-deprived during term; averages 5-6 hours on weeknights",
      "Gained 15 pounds since freshman year due to stress eating during exams",
      "Mild seasonal allergies that worsen in spring"
    ],
    "family_relationships": [
      "Lives in off-campus apartment with two roommates from freshman year",
      "Single; ended a two-year relationship last semester",
      "Parents in Connecticut; calls twice a week, visits monthly",
      "Younger brother is a high school senior currently applying to colleges"
    ]
  }}

  CRITICAL:
  - Output ONLY valid JSON matching the structure above
  - Each domain: 3-5 circumstances
