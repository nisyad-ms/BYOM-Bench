name: Expand Persona (v2)
description: Expands a basic persona into a rich character with life facts and baseline preferences. Optimized from v1 — consolidated redundancy, added system prompt.
used_by: memory_gym/data_generators/multisession.py::_expand_persona
variables:
  - persona: Basic persona description (can be brief)

system_prompt: |
  You are a character designer creating detailed, realistic personas for an AI benchmark.
  You produce two outputs: life facts (static biography) and baseline preferences (dynamic behaviors that will evolve over time).
  Output valid JSON only.

template: |
  Expand this persona into a fully realized character.

  PERSONA: {persona}

  ═══════════════════════════════════════════════════════════════════════════════
  TASK
  ═══════════════════════════════════════════════════════════════════════════════

  1. Assign age, gender, and location (if not already specified).
  2. Write LIFE FACTS — biography across 5 domains (3-5 facts each).
  3. Write BASELINE PREFERENCES — how they engage with life across 5 domains (exactly 5 per domain, 25 total).

  ═══════════════════════════════════════════════════════════════════════════════
  LIFE FACTS vs BASELINE PREFERENCES — ONE KEY DISTINCTION
  ═══════════════════════════════════════════════════════════════════════════════

  LIFE FACTS = WHAT/WHO/WHERE (static biography, won't change)
    Language: "is", "has", "does", "works", "lives"
    Examples: "Is 32", "Has hypertension", "Runs 5K twice weekly", "Has 2 kids"

  BASELINE PREFERENCES = HOW they do things (dynamic, will evolve via life events)
    Language: habits, routines, constraints, choices, avoidances, commitments
    Examples: "Only eats gluten-free", "Runs every morning at 6am", "Avoids crowded places"

  CORRECT separation (Fact → Preference):
    "Goes hiking"               → "Likes rocky terrain; avoids crowded trails"
    "Reads books"               → "Reads hard sci-fi exclusively — won't touch romance"
    "Has two kids"              → "Plans family activities 2+ weeks in advance"
    "Works as software engineer" → "Works in-person at the office; avoids remote setups"

  WRONG:
    Fact using preference language: "Prefers city breaks" (wrong — use "Takes city breaks")
    Duplicated info: Fact "Reads sci-fi" → Preference "Loves sci-fi" (same thing restated)

  ═══════════════════════════════════════════════════════════════════════════════
  LIFE FACTS — 5 DOMAINS (3-5 facts each)
  ═══════════════════════════════════════════════════════════════════════════════

  1. work_and_education: Job, career trajectory, education, certifications
  2. relationships_and_personal: Family, romantic life, friendships, living situation
  3. health_and_wellness: Physical health, fitness activities, conditions, sleep
  4. travel_and_experiences: Travel history, commute, places lived/visited
  5. hobbies_and_interests: Activities, creative pursuits, entertainment, leisure

  Rules:
  - Use WHAT/WHO/WHERE language only — no preference words (prefers, avoids, likes, only, never)
  - Adapt to life stage (student, working adult, retiree, etc.)
  - Include both positive and negative aspects (e.g., health conditions alongside fitness)
  - Facts should provide hooks for dramatic life events later

  ═══════════════════════════════════════════════════════════════════════════════
  BASELINE PREFERENCES — 5 DOMAINS (exactly 5 per domain, 25 total)
  ═══════════════════════════════════════════════════════════════════════════════

  Domains: work_education, health_wellness, travel_experiences, relationships_personal, hobbies_interests

  Rules:
  - Specific and actionable (an AI agent could use these to personalize recommendations)
  - Include both positive behaviors AND restrictions/avoidances
  - Must NOT duplicate life facts — facts say WHAT, preferences say HOW
  - Should be CHANGEABLE by dramatic life events later
  - Use varied starter examples — do NOT start every preference with "Prefers...":
    Habits: "Runs every morning", "Reads before bed"
    Routines: "Attends yoga Tuesdays", "Meal preps Sundays"
    Constraints: "Only uses...", "Never eats...", "Must have..."
    Choices: "Chooses window seats", "Takes stairs over elevators"
    Commitments: "Volunteers at shelter Saturdays", "Maintains daily journal"
    Avoidances: "Avoids crowded places", "Refuses budget airlines"
    Preferences: "Prefers quiet cafes" (use sparingly)

  ═══════════════════════════════════════════════════════════════════════════════
  EXAMPLE
  ═══════════════════════════════════════════════════════════════════════════════

  Input: "A college student studying biology"

  Output:
  {{
    "base_persona": "A college student studying biology",
    "age": 20,
    "gender": "female",
    "location": "Boston, MA",
    "work_and_education": [
      "Junior at Boston University majoring in Biology",
      "Pre-med track, planning to apply to medical schools next year",
      "Works part-time as a lab assistant (10 hrs/week)",
      "Struggling with organic chemistry this semester"
    ],
    "relationships_and_personal": [
      "Lives in off-campus apartment with two roommates",
      "Single, focused on studies but open to dating",
      "Parents live in Connecticut, visits monthly",
      "Close friend group from freshman dorm"
    ],
    "health_and_wellness": [
      "Generally healthy but sleep-deprived during exam periods",
      "Experiences stress eating when overwhelmed",
      "Played soccer in high school, now exercises occasionally",
      "Has mild seasonal allergies"
    ],
    "travel_and_experiences": [
      "Studied abroad in Spain sophomore year",
      "Limited budget constrains travel frequency",
      "Goes home for holidays and summer breaks"
    ],
    "hobbies_and_interests": [
      "Watches medical dramas",
      "Goes hiking when she has time",
      "Active on social media",
      "Keeps a bullet journal"
    ],
    "baseline_preferences": {{
      "work_education": [
        "Studies in complete silence only - even instrumental music is distracting",
        "Uses physical flashcards exclusively for memorization, never digital apps",
        "Works independently on projects - avoids group work when possible",
        "Studies late at night (10pm-2am) and sleeps through mornings",
        "Buys new textbooks only - needs to highlight and annotate fresh copies"
      ],
      "health_wellness": [
        "Eats strictly vegetarian - avoids all meat for ethical reasons",
        "Does team sports and dance workouts; refuses to run",
        "Drinks only coffee for caffeine - won't touch energy drinks",
        "Practices morning yoga for 10 minutes before class",
        "Tracks sleep every night with Fitbit - reviews data weekly"
      ],
      "travel_experiences": [
        "Flies only full-service airlines - won't book budget carriers",
        "Chooses window seats on every flight - can't sleep on aisle",
        "Books Airbnbs with kitchens rather than hotels",
        "Carries physical backup of all travel documents",
        "Plans trips 3+ months in advance - never travels spontaneously"
      ],
      "relationships_personal": [
        "Texts instead of calling, even for complex conversations",
        "Arrives 15 minutes early to every meeting and event",
        "Requests no surprise parties - wants planned celebrations",
        "Gives practical gifts (gift cards, needed items) only",
        "Attends small gatherings (3-5 people) but skips large parties"
      ],
      "hobbies_interests": [
        "Watches new movie releases in theaters only, never streams at home",
        "Uses Instagram and YouTube daily but refuses to install TikTok",
        "Reads physical books exclusively - won't use e-readers",
        "Maintains paper to-do lists instead of digital apps",
        "Reads articles for information; avoids podcasts entirely"
      ]
    }}
  }}

  CRITICAL:
  - Output ONLY valid JSON matching the structure above
  - Life fact lists: 3-5 items each
  - baseline_preferences: 5 domains, EXACTLY 5 preferences per domain
  - No duplication between facts and preferences
