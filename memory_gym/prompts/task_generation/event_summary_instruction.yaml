name: Event Summary Prompt
description: Summarize life events into concise 1-3 sentence summaries for task generation
used_by: memory_gym/task_generators/evaluation_task.py::_summarize_events
variables:
  - events: Formatted list of session events to summarize

template: |
  Summarize each life event below into 1-3 sentences max. Return a JSON object mapping session number to its summary.

  Output format:
  {{"0": "summary...", "1": "summary...", ...}}

  {events}
