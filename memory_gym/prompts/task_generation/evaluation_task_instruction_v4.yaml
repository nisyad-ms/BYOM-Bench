name: Generate Evaluation Task (v4 - Task only, no user_prompt)
description: LLM selects 6 coherent preferences and generates evaluation event (user_prompt generated separately)
used_by: persona_gym/task_generators/evaluation_task.py::_generate_evaluation_event_v2
variables:
  - persona: The user persona description
  - preference_evolution_story: Preference ledger with baseline and evolution history
  - num_evolved_required: Number of evolved preferences to select (default 3)
  - num_baseline_required: Number of baseline preferences to select (default 3)
  - previous_events: List of event descriptions already generated (to avoid duplicates)

template: |
  Generate an evaluation task testing an AI agent's preference memory.

  ## BACKGROUND CONTEXT
  - Agent has learned user preferences across multiple conversations (sessions)
  - Each conversation session corresponds to a life event where the user talked to the agent
  - Some preferences EVOLVED due to life events (old preference is now STALE)
  - We will test if the agent recalls CURRENT preferences AND avoids stale ones

  ## INPUT

  USER PERSONA: 
  {persona}

  PREFERENCE EVOLUTION HISTORY:
  {preference_evolution_story}

  ## YOUR TASK: STEPS

  1. SELECT {num_evolved_required} evolved preferences and {num_baseline_required} baseline preferences
    1.1 Preference selection criteria:
    - Choose preferences that fit naturally in one coherent task scenario
    - Evolved preferences are CRITICAL - they test memory quality
    - Avoid forcing unrelated preferences together
    - All selected preferences should be testable in the task
  2. **CORE TASK** DESIGN a task scenario where all 6 selected preferences naturally matter
    2.1 SEE 'TASK MUST BE USER-CENTRIC' and 'TASK MUST BE A NEW SCENARIO' sections below for guidance
  3. Iterate and refine step 2 till the combination of the task and preferences feels NATURAL and COHERENT
  4. Define what perfect completion looks like (for the judge)

  
  ## TASK MUST BE USER-CENTRIC
  - The task MUST directly benefit the USER, not others
  - AVOID tasks where user organizes events/activities for a group. When organizing for others, user's personal preferences don't naturally apply
  - GOOD: "Plan MY trip", "Set up MY workspace", "Create MY meal plan"
  - BAD: "Organize event for my community", "Plan hackathon for engineers"

  ## TASK MUST BE A NEW SCENARIO
  - The task MUST be a NEW life event that has NOT already happened with the user
  - The sessions in the preference evolution history are PAST events - create a FUTURE scenario which is different from all previous ones
  - **Be creative and DIVERSE:** 
    - AVOID defaulting to travel/vacation scenarios - these are overused
    - Consider unique events like home renovation, new hobby, career transition, health routine, learning a skill, family or relationship milestones, etc.
  - The preferences were learned from past events, but the evaluation task should be a fresh situation that tests user preferences in a NEW context

  ## ALREADY GENERATED EVALUATION EVENTS (if present - create something DIFFERENT from these)
  {previous_events}

  ## OUTPUT FORMAT (JSON)
  {{
    "selected_preferences": [
      {{"id": "pref_XXX", "fact": "...", "is_evolved": true/false, "evolved_from": "..." or null}}
    ],
    "event": "Brief situation description (1-3 sentences) - what the user needs help with",
    "task_internal": "What perfect completion looks like - how the agent should apply each preference. Number each point for clarity.",
    "date": "MM/DD/YYYY"
  }}

  NOTE: Do NOT generate user_prompt - that will be created separately.

  ## EXAMPLES

  Example 1 - Wellness Retreat:
  {{
    "selected_preferences": [
      {{"id": "pref_012", "fact": "Now swims instead of running due to knee surgery", "is_evolved": true, "evolved_from": "Ran 5 miles every morning"}},
      {{"id": "pref_045", "fact": "Follows vegetarian diet", "is_evolved": true, "evolved_from": "No dietary restrictions"}},
      {{"id": "pref_003", "fact": "Budget $2000/month discretionary", "is_evolved": false, "evolved_from": null}},
      {{"id": "pref_007", "fact": "Lives in Seattle area", "is_evolved": false, "evolved_from": null}},
      {{"id": "pref_019", "fact": "Prefers boutique hotels over chains", "is_evolved": false, "evolved_from": null}},
      {{"id": "pref_023", "fact": "Enjoys morning activities, not a night owl", "is_evolved": false, "evolved_from": null}}
    ],
    "event": "The user is planning a solo wellness retreat for next month to decompress after a stressful quarter.",
    "task_internal": "Perfect completion: Agent recommends swimming/water activities (not running), vegetarian-friendly venues, stays within $2000 budget, suggests Seattle-area or nearby destinations, recommends boutique hotels, schedules activities in the morning.",
    "date": "03/15/2024"
  }}

  Example 2 - Home Office Setup:
  {{
    "selected_preferences": [
      {{"id": "pref_031", "fact": "Likes to work in quiet environments", "is_evolved": true, "evolved_from": "Loved working in cafes"}},
      {{"id": "pref_032", "fact": "Needs ergonomic setup for chronic back pain", "is_evolved": true, "evolved_from": "No physical constraints"}},
      {{"id": "pref_033", "fact": "Prefers natural lighting due to light sensitivity", "is_evolved": true, "evolved_from": "No lighting preferences"}},
      {{"id": "pref_008", "fact": "Budget-conscious, researches before buying", "is_evolved": false, "evolved_from": null}},
      {{"id": "pref_015", "fact": "Minimalist aesthetic preference", "is_evolved": false, "evolved_from": null}},
      {{"id": "pref_022", "fact": "Tech-savvy, likes smart home integration", "is_evolved": false, "evolved_from": null}}
    ],
    "event": "The user is setting up a dedicated home office after transitioning to permanent remote work.",
    "task_internal": "Perfect completion: Agent recommends how to create a quiet environment, recommends ergonomic chair/desk for back pain, positions desk near windows for natural light, suggests budget-friendly options with research links, recommends minimalist furniture, includes smart home integration ideas.",
    "date": "04/20/2024"
  }}

