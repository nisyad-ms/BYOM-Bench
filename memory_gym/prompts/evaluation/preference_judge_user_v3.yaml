name: Preference Judge User Prompt (v3)
description: >
  User prompt providing data for preference recall scoring. Includes simulator
  verdicts extracted from scratchpads alongside required preferences and transcript.
used_by: memory_gym/evaluation_multisession/judge.py::MultiSessionJudge
variables:
  - required_preferences: List of required preferences with optional supersedes info
  - transcript: JSON formatted dialogue transcript
  - num_required: Number of required preferences
  - simulator_verdicts: Formatted simulator verdicts per preference (from scratchpad data)

template: |
  ## Required Preferences
  {required_preferences}

  ## Simulator Verdicts
  {simulator_verdicts}

  ## Conversation Transcript
  {transcript}

  Total required preferences: {num_required}

  Validate each simulator verdict using the specificity and stale checks described in the system prompt. Output JSON only.
