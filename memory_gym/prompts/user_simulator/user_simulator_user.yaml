name: User Simulator User Prompt
description: User prompt providing conversation history for user simulator to respond to
used_by: memory_gym/evaluation_multisession/user_simulator.py::MultiSessionUserSimulator
variables:
  - conversation: Formatted conversation history as string

template: |
  ## Conversation so far:
  {conversation}

  ---
  This is NOT your first message. The conversation above already contains your
  opening message and at least one agent reply. You MUST follow PHASE 2:
  evaluate the agent's last response in your scratchpad before responding.
