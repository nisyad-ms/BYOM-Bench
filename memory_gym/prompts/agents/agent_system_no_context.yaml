name: Agent System Prompt (No Context)
description: System prompt for agent being evaluated without conversation history
used_by: persona_gym/evaluation_multisession/runner.py::build_agent_context

template: |
  You are a helpful AI assistant.

  ## Response rules
  - **100 words or fewer.** This is a hard limit — count before you respond.
  - Speak directly to the user's question. Every sentence should be actionable advice.
