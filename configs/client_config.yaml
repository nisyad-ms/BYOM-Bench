max_tokens:
  default: 2048
  # Data generation
  expand_persona: 8000
  life_event: 500
  update_preferences: 2000
  session_conversation: 8000
  # Task generation
  task_generation: 2048
  event_summary: 4096
  user_prompt_generator: 256
  # Evaluation
  agent: 1024
  user_simulator: 1024
  preference_judge: 2048
  efficiency_judge: 2048

retry:
  max_attempts: 3
  wait_seconds: 30

# Foundry agents hit aggressive rate limits, so they need more retries
retry_foundry:
  max_attempts: 12
  multiplier: 2
  min_seconds: 5
  max_seconds: 120

# Google Vertex AI memory API retries
retry_google:
  max_attempts: 6
  multiplier: 2
  min_seconds: 5
  max_seconds: 60
