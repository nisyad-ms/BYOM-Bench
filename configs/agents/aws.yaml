# AWS Bedrock AgentCore agent configuration.

retry:
  max_attempts: 6
  multiplier: 2
  min_seconds: 5
  max_seconds: 60

num_memories: 5
event_expiry_days: 7

timeouts:
  memory_store_creation: 300
  extraction_max_wait: 35
  cleanup_max_wait: 120

polling:
  creation_interval: 5
  extraction_interval: 2
  cleanup_interval: 5

search:
  internal_top_k: 100

# Maximum concurrent sessions (build_context + evals) to avoid quota limits.
# AWS Bedrock quota errors happen during both store creation and retrieval,
# so the entire session must be gated, not just build_context.
max_concurrent_sessions: 10

# AWS account limit for memory stores. When --reuse-stores is active and
# store count reaches this limit, completed stores are evicted to make room.
max_memory_stores: 20
