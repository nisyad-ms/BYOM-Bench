name: User Simulator User Prompt
description: User prompt providing conversation history for user simulator to respond to
used_by: byom_bench/evaluation_multisession/user_simulator.py::MultiSessionUserSimulator
variables:
  - conversation: Formatted conversation history as string

template: |
  ## Conversation so far:
  {conversation}

  ---
  This is NOT your first message. The conversation above already contains your
  opening message and at least one agent reply. Evaluate the agent's last
  response in your scratchpad, then write your next message.
