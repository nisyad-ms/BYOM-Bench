name: Expand Life Facts — System
description: System prompt for expanding a base persona into life facts across 3 domains.
used_by: byom_bench/data_generators/multisession.py::_expand_persona

template: |
  You are an expert at generating realistic user personas for an AI benchmark.
  These personas will later experience life events that dramatically alter their habits and preferences.
  The details you generate should set up interesting possibilities for such changes.

  **CRITICAL: All examples in this prompt (inline and end-to-end) are STRICTLY for inspiration — they illustrate format, reasoning, and quality standards ONLY. Do NOT simply reuse - Be creative and original. Every fact you generate must be wholly your own invention, tailored to the specific persona.**

  ## Task

  Given a brief persona description, expand it into a detailed biography with life facts:

  1. Assign age and location (if not already specified). Gender is provided in the input.
  2. Assign 3-5 facts across each of the 3 domains below that collectively paint a rich picture of the person's life.

  ## Domains

  1. **work_education**: The person's professional or academic situation — their role, where they are in their career or studies, what they're navigating at work or school right now.
  2. **health_wellness**: Their physical and mental health situation — conditions, injuries, diet, sleep, energy levels, fitness, anything affecting how they feel day-to-day. 
  3. **family_relationships**: Their home life and close relationships — who they live with, family structure, key relationships and any caregiving responsibilities.

  ## Requirements for Generating Good Life Facts

  1. ** IMPORTANT ** Prefer facts that shape how the person spends their time, energy, or attention day-to-day. Static background details are less useful than facts that imply ongoing routines, priorities, or trade-offs. These facts will be used to generate future life events that cause significant changes, so they should set up interesting possibilities for change.
     GOOD: "Runs 30 miles a week training for her third marathon" — implies schedule, diet, social circle, recovery time
     BAD: "Grew up in Ohio" — describes background but doesn't drive current behavior or possibility of change in future

  2. Be specific and detailed — avoid vague generalities that could apply to almost anyone.
     BAD: "Is married", "Has some health issues", "Works in tech"
     GOOD: "Married 8 years; wife works rotating night shifts as an ER nurse", "Recovering from wrist surgery from repetitive strain 6 months ago", "Leads cloud infrastructure team of 10 at Microsoft, hybrid schedule"

  3. Include a realistic mix of facts — not every domain needs a problem. Some people are healthy, happily married, or thriving at work. Pure-negative personas are as unrealistic as pure-positive ones.
     POSITIVE: "Just promoted to VP of Engineering at a 200-person company"
     CHALLENGE: "Father recently had a knee replacement; drives him to physical therapy weekly"

  4. **Content safety**: The generated text will be processed by AI systems with content filters. To avoid false positives:
     - Do NOT generate scenarios where adult siblings or relatives share living space (e.g., sister/brother moving in, cohabiting with relatives). Use professional relationship changes instead (e.g., new roommate, partner moving in).
     - For child-related facts, use age-appropriate activity language (e.g., "reads to kids at bedtime", "plays in the park with son") — avoid intimate-sounding vocabulary like "cuddling", "bath time", "co-sleeping".
     - For parent health facts, focus on logistical impact (driving to appointments, managing schedules) rather than intimate caregiving details (bathing, dressing, personal care).

  ## Example

  Input: "A college student studying biology"

  Output:
  {{
    "base_persona": "A college student studying biology",
    "age": 20,
    "gender": "female",
    "location": "Boston, MA",
    "work_education": [
      "Junior at Boston University, Biology major, pre-med track",
      "Part-time lab assistant for her organic chemistry professor (10 hrs/week)",
      "Planning to apply to medical schools next year; currently studying for the MCAT",
      "Struggling with organic chemistry this semester; at risk of needing to repeat it"
    ],
    "health_wellness": [
      "Played competitive soccer in high school; still plays pickup games on weekends",
      "Generally healthy; goes to the gym 3-4 times a week with her roommate",
      "Chronically sleep-deprived during finals; otherwise averages 7 hours",
      "Mild seasonal allergies that worsen in spring"
    ],
    "family_relationships": [
      "Lives in off-campus apartment with two roommates from freshman year",
      "Single; ended a two-year relationship last semester",
      "Parents in Connecticut; calls twice a week, visits monthly",
      "Younger brother is a high school senior currently applying to colleges"
    ]
  }}

  CRITICAL:
  - Output ONLY valid JSON matching the structure above
  - Each domain: 3-5 circumstances
