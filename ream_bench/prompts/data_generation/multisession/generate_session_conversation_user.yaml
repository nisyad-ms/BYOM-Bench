name: Generate Session Conversation (v2)
description: Generates a conversation around a life event where the user naturally reveals only the preferences that changed this session (new + evolved), not all active preferences.
used_by: byom_bench/data_generators/multisession.py::_generate_session_conversation
variables:
  - persona: The user persona description
  - life_event: The life event context for this session
  - event_date: Date of the session
  - session_delta: JSON list of preferences that changed this session (new + evolved)
  - session_id: The session number (0, 1, 2, ...)

template: |
  Generate a natural conversation between a user and an AI assistant. The conversation takes place shortly after the described life event.

  PERSONA:
  {persona}

  LIFE EVENT (just happened):
  {life_event}
  Date: {event_date}

  PREFERENCES THAT CHANGED THIS SESSION:
  {session_delta}

  SESSION NUMBER: {session_id}

  ## Requirements

  1. Keep the conversation to 8-16 turns (one turn = one user message + one assistant response). You don't have to reveal all preferences in the first few turns — let them surface naturally as the user asks for help and responds to suggestions. Some turns may not reveal any preferences at all, and that's fine — the conversation should flow naturally, not be forced to hit a quota of revealed preferences each turn.
    - Ask follow-up questions, push back on suggestions, share context about what works and doesn't — just like a real conversation. The assistant should be an active participant, not just a source of advice. This creates natural and varied entry points for preferences to surface, rather than revealing them monotonously as the user lists them off one by one.
  2. The user's first message MUST share or allude to the life event before asking for concrete help around the new reality — the assistant should not have to guess the context
  3. The conversation is a genuine problem-solving exchange — the user asks questions, the assistant makes suggestions, the user responds with what works or doesn't
  4. **The USER always reveals changed preferences — the assistant NEVER guesses or assumes them.** The assistant may ask open-ended questions ("How has that affected your routine?"), but must not preemptively state the change ("I imagine you've stopped running"). If the assistant suggests something the old preference would have covered, the user corrects them — this is the natural way preferences surface.
  5. **ALL changed preferences MUST surface** — but through the flow of conversation, not as announcements.
    - NOTE: Changed preferences include new, evolved and dropped preferences. Don't forget to surface dropped preferences as well.
  6. Do not end the conversation until all preferences from the delta have surfaced

  ## Content safety

  This text will be processed by AI content filters. To prevent false positives:
  - Use age-appropriate activity language for children (e.g., "reads to kids at bedtime", "takes daughter to the park") — avoid intimate-sounding words like "cuddling", "bath time", "co-sleeping".
  - For family caregiving, focus on logistics (appointments, schedules) not intimate personal care.
  - Avoid phrasing that places adult siblings in shared living spaces.

  ## Example

  Life event: Promoted to VP of Engineering — larger team, heavier schedule, travel now required

  Preferences that changed:
  [
    {{"type": "evolved", "old": "Runs 5K every morning before work", "new": "Takes a 20-min walk at lunch — only exercise that fits the new schedule", "reason": "Back-to-back meetings now start at 7am, eliminating morning free time"}},
    {{"type": "evolved", "old": "Hosts dinner party for friends every other Friday", "new": "Rarely hosts; too drained after the week to have people over", "reason": "VP role leaves little social energy by Friday evening"}},
    {{"type": "new", "fact": "Books Friday 2-4pm as a no-meeting thinking block every week"}},
    {{"type": "new", "fact": "Keeps phone on Do Not Disturb all weekend — no work calls Saturday or Sunday"}},
    {{"type": "drop", "fact": "Reserves the office conference room every Tuesday for team whiteboard sessions", "reason": "Now travels Tuesdays; no longer in the office on that day"}}
  ]

  Good conversation (annotations show how each preference surfaces):
  [user]: "So I finally got the VP title — officially started three weeks ago. It's a lot. The team doubled and I'm already on a plane twice a month. I'm struggling to keep any kind of routine. Any thoughts on how to structure the week so I don't just react to everything?"
  [assistant]: "Congrats on the promotion — that's a big shift. The reactive feeling is common when scope jumps suddenly. One thing that helps is anchoring a few fixed blocks before the week fills in. Do you have any protected time right now, or is the calendar basically open season?"
  [user]: "I've started blocking Friday afternoons — 2 to 4 — as a no-meeting zone. Just for thinking and planning. If I don't put something there immediately, someone books it within minutes."  ← NEW pref surfaced while asking for help
  [assistant]: "That's exactly the right instinct. Friday afternoon works well because most people are winding down anyway. Have you thought about protecting anything earlier in the week for deeper work, or is the meeting load too unpredictable?"
  [user]: "Mornings used to be my time — I'd run and then have an hour before anyone else was online. That's completely gone now. Standups start at 7. I've been squeezing in a 20-minute walk at lunch just to get outside, but it's not the same."  ← EVOLVED pref surfaces as context explaining a constraint
  [assistant]: "It's not the same, but don't underestimate it — consistent movement mid-day actually helps with afternoon focus. On the morning front, have you considered whether some of those 7am standups actually need you, or could you delegate a few?"
  [user]: "Honestly, probably yes. I've been defaulting to attending everything because it's new and I want visibility. But you're right — I should audit them. The harder thing is evenings and weekends. I'm getting pinged constantly. What do other people do about that?"
  [assistant]: "The most sustainable thing is an explicit boundary that your team knows about — not just turning off notifications, but communicating the policy. Something like: async messages anytime, but no expectation of response until Monday morning. Have you set anything like that?"
  [user]: "I did actually — phone goes on Do Not Disturb all weekend. I told the team to email if something is truly on fire. It felt awkward to say out loud but it's been fine so far. The harder thing is I used to host dinners on Fridays to stay connected with friends, and I've just... stopped. By Friday evening I have nothing left."  ← NEW pref as pushback on suggestion (already done); EVOLVED pref surfaces as context
  [assistant]: "That makes sense — hosting takes energy you no longer have at the end of the week. Could you shift it to a lower-effort format, or move it to Saturday when you've had a night to recover?"
  [user]: "Maybe Saturday lunch could work. Lower stakes than a dinner. Oh, and I had to give up my Tuesday whiteboard sessions — I'm traveling most Tuesdays now, so that's just gone. Need to find another way to keep the team aligned."  ← DROP surfaced naturally — the user mentions the old habit is gone due to changed circumstances
  [assistant]: "Losing that regular touchpoint is tough. You could try async alternatives — a shared doc or a short Loom video — to keep alignment without needing everyone in a room. Would that work for your team?"
  [user]: "Yeah, async might actually be better given the new pace. I'll try that. Thanks — this was actually useful, I came in feeling like I was just firefighting."

  OUTPUT FORMAT (JSON):
  {{
    "conversation": [
      {{"role": "user", "content": "User's message..."}},
      {{"role": "assistant", "content": "Assistant's response..."}},
      ...
    ]
  }}

  CRITICAL:
  - Output ONLY valid JSON
  - Roles must alternate starting with "user"
  - Each turn must have exactly "role" and "content" fields
  - Role values must be exactly "user" or "assistant"
