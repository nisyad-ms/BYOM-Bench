name: Generate Subtopics
description: Generates relevant subtopics based on user persona and main topic
used_by: persona_gym/data_generators/personamem_v2.py::_generate_topics_for_persona
variables:
  - persona: The user persona description
  - topic: The main topic area

template: |
  Given this user persona:

  {persona}

  And the main topic area: {topic}

  Generate 3-5 specific subtopics or aspects of {topic} that this person would likely discuss.
  These should be natural areas of interest based on their background.

  Output as a JSON array of strings, e.g.: ["subtopic1", "subtopic2", "subtopic3"]
