name: Generate Life Event
description: Generates a single life event for a specified domain, with natural narrative coherence to previous events
used_by: persona_gym/data_generators/multisession.py::_generate_life_event
variables:
  - persona: The full expanded persona description
  - domain: The life domain for this event (work_education, health_wellness, travel_experiences, relationships_personal, hobbies_interests)
  - domain_facts: Specific facts about the persona for this domain
  - previous_events: List of previously generated events to build upon

template: |
  Generate a realistic life event for the specified domain that is personalized to this persona. The event should be significant enough to DRAMATICALLY change the user's preferences, habits, or priorities.

  PERSONA:
  {persona}

  TARGET DOMAIN: {domain}

  DOMAIN-SPECIFIC FACTS (use these to personalize the event):
  {domain_facts}

  PREVIOUS EVENTS IN THIS PERSON'S STORY:
  {previous_events}

  ═══════════════════════════════════════════════════════════════════════════════
  NARRATIVE COHERENCE: NATURAL CONNECTIONS OVER MONTHS, NOT TIGHT CHAINING
  ═══════════════════════════════════════════════════════════════════════════════
  
  Life events should feel like a coherent story unfolding over MONTHS, not a chain reaction of immediate consequences.
  
  GOOD COHERENCE (natural life progression over time):
  - Event 1 (Jan): "Diagnosed with early diabetes at annual checkup"
  - Event 2 (Apr): "Wife gets job offer in Portland, family considering relocation" 
    → Natural life event, loosely connected (health situation is background context)
  - Event 3 (Jul): "After settling into Portland, joined a local hiking group to stay active"
    → Builds on relocation, connects to health management
  
  BAD COHERENCE (too tight, immediate consequences):
  - Event 1: "Diagnosed with diabetes"
  - Event 2: "Due to diabetes, can't eat at favorite restaurants" ← Too immediate
  - Event 3: "Restaurant restrictions caused social isolation" ← Artificial chain
  
  GUIDELINES FOR NATURAL COHERENCE:
  1. Events can ACKNOWLEDGE previous events as background context
  2. Events should feel like MONTHS have passed, not days
  3. New events should introduce FRESH situations, not just extend consequences
  4. Cross-domain connections are encouraged (health affects work, family affects hobbies)
  5. Some events can be unrelated - not everything needs to connect
  6. Avoid phrases like "due to", "as a result of", "because of the previous..."
  
  THINK OF IT AS: "What might happen to this person 2-3 months later, given their life context?"
  NOT: "What is the immediate consequence of the last event?"

  DOMAIN DEFINITIONS:
  - work_education: Career changes, job transitions, education, professional development
  - health_wellness: Physical/mental health, fitness, diet, medical conditions
  - travel_experiences: Relocations, travel habits, living situation changes
  - relationships_personal: Family dynamics, romantic relationships, friendships, living arrangements
  - hobbies_interests: Hobbies, creative pursuits, entertainment preferences, leisure activities

  REQUIREMENTS:
  1. The event MUST belong to the "{domain}" domain
  2. The event must be plausible given the persona's background, age, and life context
  3. The event should create opportunities for DRAMATIC preference changes
  4. The event should be specific and concrete, not vague
  5. Include enough detail to understand the impact on daily life
  6. Natural connections to previous events are welcome, but avoid tight causal chaining

  PREFER CONSTRAINT-GENERATING EVENTS (~60-70%)
  
  Events that force REPLACEMENT of existing preferences (not just refinement):
  - Health diagnoses that eliminate options (allergies, conditions, injuries)
  - Life role changes (new parent, caregiver, new demanding job)
  - Major relationship shifts (new partner with different lifestyle, divorce)
  - Resource constraints (budget cuts, time limitations, relocation)
  
  These create VERIFIABLE preference changes:
  - OLD: "Loves steak" → NEW: "Partner is vegan, household is now plant-based"
  - OLD: "Night owl, works until 2am" → NEW: "New baby, strict 9pm bedtime"
  - OLD: "Runs marathons" → NEW: "Knee surgery, now swims instead"
  
  The remaining 30-40% can be positive shifts (new opportunities, discoveries, lifestyle upgrades).

  EXAMPLES OF GOOD LIFE EVENTS BY DOMAIN:

  work_education:
  - "Laid off unexpectedly, now job hunting with tighter budget"
  - "Promoted to VP role requiring 60+ hour weeks and constant travel"
  - "Switched to night shift, completely reversing daily schedule"
  - "New manager requires strict 9-5 in-office, ending all remote work"
  - "Went back to grad school part-time, evenings/weekends now studying"
  - "Started own consulting business, irregular income and hours"

  health_wellness:
  - "Diagnosed with celiac disease, must follow strict gluten-free diet"
  - "Discovered severe shellfish allergy after ER visit"
  - "Knee replacement surgery, running is now impossible - must find alternatives"
  - "Diagnosed with Type 2 diabetes, complete diet overhaul required"
  - "Developed chronic migraines, avoiding screens after 6pm"
  - "Doctor ordered strict low-sodium diet due to blood pressure"

  travel_experiences:
  - "Relocated to a different country for spouse's job"
  - "Sold car after moving downtown, now fully car-free"
  - "Job now requires 50% travel, home only half the month"
  - "Moved from city apartment to rural farmhouse 2 hours from town"
  - "Downsized to tiny home, minimal possessions only"

  relationships_personal:
  - "New partner is strictly vegan, household now plant-based"
  - "Became first-time parent, no personal time or sleep"
  - "Elderly parent moved in, needs quiet house by 8pm"
  - "Going through divorce, selling house and splitting assets"
  - "Child diagnosed with severe nut allergy, entire household diet changed"
  - "Partner works nights, now have opposite schedules"

  hobbies_interests:
  - "Adopted two rescue dogs requiring daily 2-hour walks"
  - "Got deeply into competitive chess, plays 3 hours daily"
  - "Discovered passion for woodworking, converted garage to workshop"
  - "Joined amateur theater group, rehearsals every evening"
  - "Started serious photography, spends weekends on photo trips"

  EXAMPLES OF BAD EVENTS (avoid these):

  ❌ TOO TIGHTLY CHAINED:
  - "Due to the diabetes diagnosis, now also dealing with..." 
  - "As a direct result of the relocation..."
  - "The stress from the previous changes caused..."
  
  ❌ TOO VAGUE:
  - "Moved to a new city" (why? what's different?)
  - "Things changed at work" (what specifically?)
  - "Had some health issues" (what kind? what impact?)
  - "Life got busy" (with what? why?)

  OUTPUT FORMAT (JSON):
  {{
    "event": "Specific description of what happened, personalized to this persona",
    "domain": "{domain}",
    "context": "How this event affects their daily life, priorities, or preferences"
  }}

  CRITICAL:
  - Output ONLY valid JSON
  - The "domain" field must be exactly "{domain}"
  - The event must be appropriate for the specified domain
  - The event must be personalized to the persona (consider their age, background, interests)
  - Provide enough context to understand the impact on preferences
