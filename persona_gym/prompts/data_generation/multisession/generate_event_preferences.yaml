name: Generate Event Preferences
description: Generates new event-specific preferences based on persona and life event. These are NEW preferences that emerge from the event, not evolutions of existing ones.
used_by: persona_gym/data_generators/multisession.py::_generate_event_preferences
variables:
  - persona: The user persona description
  - life_event: The life event and its context
  - event_date: Date of the life event
  - current_preferences: JSON list of currently active preferences (to avoid duplication), can be empty for session 0
  - num_preferences: Number of new preferences to generate (typically 3)

template: |
  Based on the persona and their current life event, generate exactly {num_preferences} NEW specific user preferences. These preferences must be directly relevant to the life event and DIFFERENT from any existing preferences.

  PERSONA:
  {persona}

  LIFE EVENT:
  Event: {life_event}
  Date: {event_date}

  CURRENTLY ACTIVE PREFERENCES (do NOT duplicate these - may be empty for first session):
  {current_preferences}

  REQUIREMENTS:
  1. Generate exactly {num_preferences} NEW preferences
  2. All preferences must be directly tied to this life event
  3. Preferences must NOT overlap with or duplicate any existing preferences
  4. Each preference should naturally surface when discussing/handling this event
  5. Preferences must be specific and actionable (not vague)
  6. Assign each preference a descriptive category that fits naturally

  CRITICAL: MAKE PREFERENCES CONCRETE AND SPECIFIC
  
  Preferences must be specific enough that they could be REVERSED or DRAMATICALLY CHANGED by a future life event.
  Include: WHAT specifically they do, WHEN they do it, HOW OFTEN, WHAT they consume/avoid.
  
  ❌ BAD (vague): "Prefers healthy eating"
  ✓ GOOD (concrete): "Eats grilled salmon for dinner every Tuesday and Thursday - never misses it"
  
  ❌ BAD (abstract): "Values quality time with partner"
  ✓ GOOD (specific): "Has a strict 'no phones' rule during dinner, 7pm-8pm every night"
  
  ❌ BAD (process-focused): "Tries to exercise regularly"
  ✓ GOOD (behavior-focused): "Swims 40 laps at the community pool every morning at 6am"

  KEY PRINCIPLE:
  These are BRAND NEW preferences that emerge from this life event. They should be things the person DIDN'T have before, not modifications of existing traits. Evolution of existing preferences is handled separately.

  CATEGORY GUIDANCE:
  Create categories that fit the preference naturally. Categories should be short (1-3 words) and descriptive.
  Examples: "cooking", "communication", "fitness", "travel", "parenting", "music", "health", "scheduling", "budget", "dietary", "accommodation", "work_style", "shopping", "entertainment", "social"
  
  Do NOT force categories - let them emerge from the preferences.

  EXAMPLES OF GOOD NEW PREFERENCES:

  Life Event: "Diagnosed with Type 2 diabetes after years of unhealthy eating"
  NEW preferences (health-specific, things they didn't need to consider before):
  - "Checks blood sugar before and after every meal using a continuous glucose monitor" (health_monitoring)
  - "Only dines at restaurants that publish full nutritional information online" (dining)
  - "Carries emergency glucose tablets in every bag, jacket, and car" (health_preparedness)

  Life Event: "Adopted a rescue dog who needs extensive training"
  NEW preferences (pet-specific, new life domain):
  - "Cannot commit to overnight travel without arranging certified dog sitter first" (travel_planning)
  - "Only considers outdoor patios and dog-friendly cafes for social meetups" (dining)
  - "Morning routine now includes 30-minute dog walk starting at 6:15am sharp" (scheduling)

  Life Event: "Started dating someone who lives 2 hours away"
  NEW preferences (relationship-specific, new coordination needs):
  - "Weekend plans must be finalized by Wednesday evening for travel coordination" (scheduling)
  - "Prioritizes accommodations with reliable cell reception for daily 9pm video calls" (communication)
  - "Looking for activities that work well as virtual dates - online games, watch parties" (entertainment)

  Life Event: "Promoted to team lead, now managing 5 direct reports"
  NEW preferences (management-specific):
  - "Blocks 9-10am daily for 1:1s - no exceptions, never schedules anything else" (scheduling)
  - "Uses only Slack threads for work discussions - hates email chains" (communication)
  - "Takes team to lunch every Friday - rotates restaurant choice among team members" (team_culture)

  BAD EXAMPLES (overlapping with existing or too generic):
  If existing: "Prefers direct flights for work travel"
  BAD new: "Likes non-stop flights" (too similar)
  GOOD new: "Books flights with extra legroom on trips over 3 hours" (different aspect)

  OUTPUT FORMAT (JSON):
  {{
    "preferences": [
      {{
        "fact": "Specific NEW preference statement tied to this event",
        "category": "descriptive_category"
      }}
    ]
  }}

  CRITICAL:
  - Output ONLY valid JSON
  - Each preference must have both "fact" and "category" fields
  - Generate exactly {num_preferences} preferences
  - EVERY preference must be NEW and NOT duplicate existing ones
  - EVERY preference must be relevant to discussing/handling this life event
