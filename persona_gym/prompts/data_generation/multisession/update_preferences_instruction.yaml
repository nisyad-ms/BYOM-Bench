name: Update Preferences
description: Unified prompt to evolve existing preferences and create new ones based on life events. Sees full context including all previous events and complete preference evolution history.
used_by: persona_gym/data_generators/multisession.py::_update_preferences
variables:
  - persona: The user persona description (expanded, with domain facts)
  - domain_facts: Domain-specific facts organized by category
  - current_event: The current life event being processed
  - event_date: Date of the current event
  - previous_events: List of all previous life events (empty for session 0)
  - active_preferences: JSON list of currently active preferences
  - evolution_history: JSON list showing all preference evolutions so far

template: |
  A user has experienced a life event. Your task is to UPDATE their preferences:
  1. EVOLVE existing preferences that would naturally change due to this event
  2. CREATE new preferences that emerge from this event

  ═══════════════════════════════════════════════════════════════════════════════
  PERSONA CONTEXT
  ═══════════════════════════════════════════════════════════════════════════════
  
  {persona}

  DOMAIN FACTS (initial biography - may be outdated due to life events):
  {domain_facts}

  ═══════════════════════════════════════════════════════════════════════════════
  LIFE EVENT HISTORY (what has happened to this person)
  ═══════════════════════════════════════════════════════════════════════════════
  
  PREVIOUS EVENTS:
  {previous_events}

  CURRENT EVENT (the one we're processing now):
  {current_event}
  Date: {event_date}

  ═══════════════════════════════════════════════════════════════════════════════
  PREFERENCE STATE
  ═══════════════════════════════════════════════════════════════════════════════

  CURRENTLY ACTIVE PREFERENCES:
  {active_preferences}

  PREFERENCE EVOLUTION HISTORY (what has already changed):
  {evolution_history}

  ═══════════════════════════════════════════════════════════════════════════════
  YOUR TASK
  ═══════════════════════════════════════════════════════════════════════════════

  Based on the CURRENT EVENT, decide:
  
  1. EVOLUTIONS: Which active preferences would DRAMATICALLY change due to this event?
     - Analyze each active preference
     - Only evolve if there's a genuine, traceable reason from the current event
     - Check evolution_history: avoid flip-flopping (re-evolving something that JUST changed)
       BUT re-evolution IS allowed if there's a strong new reason from the current event
     - Be selective: most events change 0-2 preferences; even major life changes rarely exceed 3
  
  2. NEW PREFERENCES: What NEW preferences emerge from this event? (0-3, be selective)
     - Only create preferences that GENUINELY emerge from this specific event
     - These are things the person didn't need to think about before
     - Must be directly tied to the current event
     - Must NOT duplicate any active preference or recently evolved one
     - Minor events may warrant 0-1 new preferences; major life changes may warrant 0-3
     - Quality over quantity - don't force preferences that feel artificial

  ═══════════════════════════════════════════════════════════════════════════════
  EVOLUTION GUIDELINES
  ═══════════════════════════════════════════════════════════════════════════════

  CRITICAL: PREFER DRAMATIC OVER SUBTLE CHANGES
  
  When evolving a preference, the NEW preference should CONTRADICT or REPLACE the old one.
  Ask: "If I follow the OLD preference, would I violate the NEW one?" → If yes, good!
  
  ❌ BAD EVOLUTIONS (too subtle):
  - "Runs marathons" → "Runs marathons and does yoga" (addition, not replacement)
  - "Eats pasta often" → "Eats pasta often, especially whole wheat" (refinement)
  - "Works late nights" → "Works late nights but takes breaks" (addition)
  
  ✓ GOOD EVOLUTIONS (dramatic, verifiable):
  - "Runs marathons" → "No longer runs due to knee injury; now swims for cardio"
  - "Eats pasta often" → "Discovered gluten intolerance; completely avoids pasta and bread"
  - "Works late nights" → "Strict 5pm work cutoff due to new parenting responsibilities"

  MORE EXAMPLES BY LIFE SCENARIO:

  Career Changes:
  - "Prefers working in large teams" → "Now works solo as freelancer; values independence over collaboration"
  - "Attends industry conferences quarterly" → "No longer travels for work; attends only virtual events"
  - "Reads technical papers for fun" → "Stopped reading technical content; focuses on management literature"

  Health Events:
  - "Drinks 4 cups of coffee daily" → "Switched to decaf only after high blood pressure diagnosis"
  - "Skips breakfast every day" → "Eats protein-rich breakfast by 7am per dietitian's plan"
  - "Prefers high-intensity workouts" → "Only does low-impact yoga due to back surgery recovery"

  Family Changes:
  - "Prefers spontaneous weekend trips" → "Plans all travel 3+ months ahead to coordinate with custody schedule"
  - "Hosts dinner parties monthly" → "No longer hosts; prefers quiet evenings due to newborn"
  - "Sleeps in until 10am on weekends" → "Up by 6am daily for baby's feeding schedule"

  Relocation:
  - "Drives everywhere; hates public transit" → "Sold car; relies entirely on subway and walking"
  - "Prefers booking hotels in city centers" → "Now books rural cottages and nature retreats"
  - "Orders takeout 5 nights a week" → "Cooks every meal; no delivery available in rural area"

  Financial Changes:
  - "Buys premium brands exclusively" → "Switched to budget alternatives due to income reduction"
  - "Dines out at restaurants weekly" → "Strictly home-cooked meals to save money"
  - "Never checks prices while shopping" → "Meticulously compares prices and uses coupons"

  Social/Relationship Changes:
  - "Prefers one-on-one meetups" → "Embraces group activities to meet people in new city"
  - "Avoids social media entirely" → "Active on parent groups and neighborhood apps for community info"
  - "Keeps strict work-life boundaries" → "Mixes personal and professional relationships as entrepreneur"

  TYPES OF DRAMATIC EVOLUTION:
  
  1. REVERSAL: Complete flip
     - "Prefers office work" → "Now strongly prefers remote after company went remote-first"
  
  2. SUBSTITUTION: Replaced activity due to new constraints
     - "Played tennis every weekend" → "Tennis elbow, switched entirely to golf"
  
  3. DISCOVERY/DIAGNOSIS: New information changes behavior
     - "Drank 4 cups of coffee daily" → "High blood pressure, switched to decaf only"
  
  4. PRIORITY INVERSION: Life event reorders what matters
     - "Prioritized career over everything" → "After health scare, now prioritizes family"

  CROSS-DOMAIN EFFECTS: Events often affect multiple domains!
  - "Started demanding VP job" could affect:
    → Work: schedule becomes rigid
    → Social: stopped hosting parties (too tired)
    → Hobbies: no time for guitar anymore

  ═══════════════════════════════════════════════════════════════════════════════
  NEW PREFERENCE GUIDELINES
  ═══════════════════════════════════════════════════════════════════════════════

  New preferences should be:
  - SPECIFIC: "Swims 40 laps at 6am every morning" not "exercises regularly"
  - CONCRETE: Include WHAT, WHEN, HOW OFTEN where applicable
  - TIED TO EVENT: Directly relevant to the current life event
  - UNIQUE: Not duplicating any active preference or recently evolved one
  - CHANGEABLE: Specific enough that a future event could dramatically change it

  DUPLICATE CHECK (CRITICAL):
  Before creating a new preference, compare it against ALL active preferences above.
  Do NOT create a new preference if:
  - It covers the same behavior/topic as an existing active preference
  - It is a minor variation of an existing preference (e.g., "Runs 5K daily" when "Runs every morning" exists)
  - It would logically conflict with an existing active preference without superseding it
  
  If the life event would modify an existing preference's behavior, use EVOLUTION instead of creating new.
  Only create genuinely NEW preferences for behaviors/topics not already covered.

  STATEMENT VARIETY (don't overuse "Prefers..."):
  Use diverse starters to describe behaviors, habits, routines, and constraints:
  
  ✓ Habits/Routines: "Runs every morning", "Meditates before bed", "Attends yoga Tuesdays"
  ✓ Constraints:     "Only eats gluten-free", "Never works past 6pm", "Requires 8hrs sleep"
  ✓ Activities:      "Swims 40 laps daily", "Walks dog twice daily", "Meal preps Sundays"
  ✓ Choices:         "Chooses window seats", "Takes stairs over elevators", "Books Airbnbs"
  ✓ Commitments:     "Volunteers at shelter Saturdays", "Maintains daily journal"
  ✓ Avoidances:      "Avoids crowded places", "Refuses budget airlines", "Won't eat red meat"
  ✓ Preferences:     "Prefers quiet cafes" (use sparingly - mix with other starters)

  DOMAIN ASSIGNMENT (required for each new preference):
  Assign each new preference to ONE of these 5 domains:
  - work_education: Work style, learning, productivity, career, education
  - health_wellness: Diet, fitness, medical routines, wellness, self-care
  - travel_experiences: Travel style, accommodations, local outings, transportation
  - relationships_personal: Communication, social habits, family routines, privacy
  - hobbies_interests: Entertainment, hobbies, technology, leisure activities

  ═══════════════════════════════════════════════════════════════════════════════
  IMPORTANT CONSTRAINTS
  ═══════════════════════════════════════════════════════════════════════════════

  1. CHECK EVOLUTION HISTORY: Strongly avoid re-evolving recently changed preferences.
     - If a preference was created or evolved in the PREVIOUS session, do NOT evolve it again
       unless the new event directly contradicts it or makes it impossible to do (not just adds context)
     - Bad: "Walks with dog" → "Walks with dog due to cardiac" (just adding reason, not changing behavior)
     - Good: "Walks with dog daily" → "No longer walks dog, hired dog walker due to mobility issues"
     - When in doubt, leave recently-evolved preferences alone
  
  2. PREFERENCES SUPERSEDE DOMAIN FACTS: Domain facts are the initial biography at persona creation.
     Life events and evolved preferences reflect the CURRENT reality.
     - If a domain fact says "Runs regularly" but an evolved preference says "No longer runs due to injury",
       the preference is the source of truth
     - New preferences can contradict domain facts when life events warrant it
     - Evolved preferences should be self-documenting (include the reason/context)
  
  3. NARRATIVE COHERENCE: Consider previous events when creating/evolving preferences.
     The changes should make sense given the person's full story.
  
  4. NO FORCED EVOLUTIONS: If nothing would naturally change, return empty evolutions.
     - Most events affect 0-2 preferences directly
     - Even major life changes rarely evolve more than 3 preferences
     - Quality over quantity: only the most directly impacted preferences should change
  
  5. NO FORCED NEW PREFERENCES: Only create new preferences that genuinely emerge from the event.
     - Can be 0 if the event doesn't introduce new domains/needs
     - Maximum of 3 new preferences per event - be highly selective

  ═══════════════════════════════════════════════════════════════════════════════
  OUTPUT FORMAT (JSON)
  ═══════════════════════════════════════════════════════════════════════════════

  {{
    "evolutions": [
      {{
        "preference_id": "pref_XXX",
        "original_preference": "The exact original preference text",
        "evolved_preference": "The new preference text after evolution",
        "domain": "one of: work_education, health_wellness, travel_experiences, relationships_personal, hobbies_interests",
        "reason": "Clear explanation of why this event caused this specific change"
      }}
    ],
    "new_preferences": [
      {{
        "fact": "Specific NEW preference statement tied to this event",
        "domain": "one of: work_education, health_wellness, travel_experiences, relationships_personal, hobbies_interests"
      }}
    ],
    "analysis": {{
      "unchanged_count": <number of active preferences that didn't change>,
      "rationale": "Brief explanation of overall changes made"
    }}
  }}

  CRITICAL:
  - Output ONLY valid JSON
  - evolutions array can be empty if nothing naturally changes
  - new_preferences array can be empty or have up to 3 items (be highly selective)
  - Include preference_id in evolutions for accurate tracking
  - Each evolution must have a clear, event-based reason
  - domain MUST be one of the 5 domains listed above
