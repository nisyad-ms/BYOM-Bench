name: Generate Session Conversation
description: Generates a conversation session where the user naturally reveals their current preferences
used_by: persona_gym/data_generators/multisession.py::_generate_session_conversation
variables:
  - persona: The user persona description
  - life_event: The life event context for this session
  - event_date: Date of the session
  - active_preferences: JSON list of currently active preferences
  - evolved_preferences: JSON list of preferences that just evolved (may be empty)
  - session_id: The session number (0, 1, 2, ...)

template: |
  Generate a natural conversation between a user and an AI assistant. The conversation should take place shortly after the described life event, and the user should naturally reveal their preferences during the conversation.

  PERSONA:
  {persona}

  LIFE EVENT (just happened):
  {life_event}
  Date: {event_date}

  CURRENT ACTIVE PREFERENCES (user should reveal these naturally):
  {active_preferences}

  RECENTLY EVOLVED PREFERENCES (if any - user may mention how things have changed):
  {evolved_preferences}

  SESSION NUMBER: {session_id}

  REQUIREMENTS:
  1. Generate 6-10 conversation turns (user and assistant alternating)
  2. The user should naturally reveal most of their active preferences
  3. For evolved preferences, the user may naturally mention the change (but not required)
  4. The conversation topic should relate to the life event
  5. Keep it natural - don't force all preferences into the conversation
  6. The assistant should be helpful and responsive

  CONVERSATION GUIDELINES:
  - Session 0: User might be seeking initial help/advice related to their situation
  - Later sessions: User follows up, updates on progress, or has new related needs
  - Preferences should emerge naturally through context, not as explicit lists
  - The user should speak like a real person, not a persona description
  - **Important** - vary the conversation opening style - avoid always starting with "Hey". Use diverse openers: direct questions, statements, thinking aloud, casual greetings, or jumping straight into the topic.

  EXAMPLE NATURAL PREFERENCE REVELATION:
  Bad: "I prefer morning meetings because I'm a morning person."
  Good: "Could we schedule this for the morning? I find I'm much sharper before lunch."

  OUTPUT FORMAT (JSON):
  {{
    "conversation": [
      {{"role": "user", "content": "User's message..."}},
      {{"role": "assistant", "content": "Assistant's response..."}},
      ...
    ]
  }}

  CRITICAL:
  - Output ONLY valid JSON
  - Roles must alternate starting with "user"
  - Each turn must have exactly "role" and "content" fields
  - Role values must be exactly "user" or "assistant"
