name: Evolve Preferences
description: Analyzes which preferences naturally evolve given a life event (event-driven, not quota-driven)
used_by: persona_gym/data_generators/multisession.py::_evolve_preferences
variables:
  - persona: The user persona description
  - life_event: The new life event that just occurred
  - event_date: Date of the new event
  - current_preferences: JSON list of currently active preferences with their IDs

template: |
  A user has experienced a significant life event. Analyze their current preferences and determine which ones would NATURALLY evolve as a result of this event.

  PERSONA:
  {persona}

  NEW LIFE EVENT:
  {life_event}
  Date: {event_date}

  CURRENT ACTIVE PREFERENCES:
  {current_preferences}

  YOUR TASK:
  Analyze EACH preference above and decide whether it would naturally change due to this life event.

  For each preference, consider:
  - Does this event directly impact this preference domain?
  - Would this person's behavior/needs genuinely shift?
  - Is there a cross-domain effect? (e.g., health event affecting work preferences, family change affecting social preferences)

  DECISION CRITERIA:
  - NO CHANGE: The preference is unaffected by this event
  - EVOLVE: The preference would genuinely change due to the event

  IMPORTANT GUIDELINES:
  1. Do NOT force evolutions - if no preferences would naturally change, return an empty evolutions array
  2. Do NOT artificially limit evolutions - if multiple preferences would genuinely change, include all of them
  3. Cross-domain evolution is encouraged when realistic (e.g., "Diagnosed with chronic fatigue" could affect both health AND work preferences)
  4. Evolution should be logical and traceable to the event
  5. The number of evolutions should be whatever is NATURAL - could be 0, 1, 2, or more

  CRITICAL: PREFER DRAMATIC OVER SUBTLE CHANGES
  
  When a preference evolves, aim for DRAMATIC, VERIFIABLE changes - not minor refinements.
  The evolved preference should be clearly distinguishable from the original, such that:
  - Using the OLD preference would produce clearly WRONG recommendations
  - An observer could easily verify whether someone knows the NEW vs OLD preference
  
  KEY RULE: REPLACE THE CORE BEHAVIOR, DON'T EXPAND IT
  
  The evolved preference should CONTRADICT or REPLACE the original, not ADD to it.
  Ask yourself: "If I follow the OLD preference, would I violate the NEW one?"
  If yes → Good evolution
  If no → Too subtle, make it more dramatic
  
  ❌ BAD: "Runs marathons" → "Runs marathons and does yoga"  (Addition, not replacement)
  ✓ GOOD: "Runs marathons" → "Can no longer run due to injury, now swims laps instead"
  
  ❌ BAD: "Eats pasta often" → "Eats pasta often, especially whole wheat"  (Refinement)
  ✓ GOOD: "Eats pasta often" → "Discovered gluten intolerance, completely avoids pasta"
  
  ❌ BAD: "Works late nights" → "Works late nights but takes breaks"  (Addition)
  ✓ GOOD: "Works late nights" → "Strict 8pm work cutoff due to sleep disorder diagnosis"
  
  TYPES OF DRAMATIC EVOLUTION (prefer these):
  
  1. REVERSAL: Complete flip in preference
     - "Prefers working from office" → "After company went remote-first, now strongly prefers working from home"
     - "Loved living in the city" → "After having kids, moved to suburbs and now dislikes urban living"
     - "Enjoyed solo travel" → "After meeting partner, now only travels as a couple"
     - "Preferred reading physical books" → "After moving frequently, switched entirely to e-books"
  
  2. SUBSTITUTION: Replaced activity/choice due to new circumstances
     - "Played tennis every weekend" → "Tennis elbow injury, switched to golf"
     - "Commuted by car" → "New job is downtown, now takes the train exclusively"
     - "Used iPhone for 10 years" → "Work requires Android, now prefers Android ecosystem"
     - "Shopped at local grocery stores" → "Busy schedule with new job, now uses grocery delivery only"
  
  3. CLEAR SHIFT: Preference changed to something different (not opposite, just different)
     - "Favorite color is black" → "Redecorated home, now prefers blue for everything"
     - "Always ordered pepperoni pizza" → "Discovered a love for mushroom pizza, now orders it exclusively"
     - "Preferred rock music" → "Partner introduced jazz, now listens to jazz almost exclusively"
     - "Vacationed at beach resorts" → "After hiking trip, now prefers mountain destinations"
     - "Watched action movies" → "Got into documentaries, now watches mostly non-fiction"
  
  4. DISCOVERY/DIAGNOSIS: New information changes behavior
     - "Drank 4 cups of coffee daily" → "Doctor found high blood pressure, switched to decaf only"
     - "Ate pasta 3x per week" → "Discovered gluten intolerance, strictly gluten-free now"
     - "Worked 60-hour weeks" → "Burnout diagnosis, now strictly works 40 hours max"
     - "Used social media constantly" → "Realized impact on mental health, now limits to 30 min/day"
  
  5. PRIORITY INVERSION: Life event reorders what matters
     - "Prioritized career over everything" → "After health scare, now prioritizes family time"
     - "Spent weekends on solo hobbies" → "After having kids, dedicates weekends entirely to family"
     - "Focused on saving money" → "Inherited money, now prioritizes experiences over savings"
     - "Preferred staying home" → "After retirement, now travels 3+ months per year"
  
  AVOID SUBTLE CHANGES LIKE:
  ❌ "Uses Slack for team communication" → "Uses Slack for team communication and also for 1:1s"
     (This just adds scope - not verifiable)
  
  ❌ "Enjoys hiking" → "Enjoys hiking with family"
     (Minor addition - recommending a solo hike wouldn't be clearly wrong)
  
  ❌ "Prefers morning meetings" → "Prefers morning meetings, ideally before 10am"
     (Just more specific - not a real change)
  
  GOOD DRAMATIC CHANGES:
  ✓ "Uses Slack for all communication" → "Company switched to Teams, now uses Teams exclusively"
     (Recommending Slack would be WRONG)
  
  ✓ "Enjoys long hiking trips" → "Bad knee, now prefers short nature walks on flat terrain"
     (Recommending a long hike would be WRONG)
  
  ✓ "Available for meetings anytime" → "New childcare schedule, only available 10am-3pm"
     (Scheduling outside that window would be WRONG)
  
  ✓ "Prefers Italian restaurants" → "Partner is vegan, now prefers vegan restaurants"
     (Recommending Italian steakhouse would be WRONG)

  BALANCE: Aim for ~80% dramatic changes, ~20% can be subtle refinements when appropriate.

  CROSS-DOMAIN EVOLUTION EXAMPLES:
  - Event: "Started a new demanding job as VP"
    → Work: "Flexible schedule, worked when inspired" → "Strict 8am-6pm in-office requirement, no flexibility"
    → Social: "Hosted dinner parties every Saturday" → "Too exhausted, stopped hosting entirely"
    → Hobbies: "Played guitar for 2 hours daily" → "No time, hasn't touched guitar in months"

  - Event: "Had a baby"
    → Sleep: "Night owl, most productive after 10pm" → "Now strictly a morning person, in bed by 9pm"
    → Travel: "Takes spontaneous weekend trips" → "Requires 2+ weeks planning for any travel"
    → Entertainment: "Loved attending loud concerts" → "Avoids loud venues, prefers quiet activities"

  - Event: "Partner moved in who has different lifestyle"
    → Diet: "Ate steak 4x per week" → "Partner is vegetarian, now eats vegetarian at home"
    → Entertainment: "Watched sports every Sunday" → "Now splits TV time, watches less sports"
    → Decor: "Minimalist aesthetic, white walls" → "Compromised on colorful, eclectic style"

  - Event: "No major impact"
    → If someone "Started a new hobby (gardening)" it likely wouldn't change their "Prefers window seat on flights" preference
    → Return empty evolutions array when nothing genuinely changes

  OUTPUT FORMAT (JSON):
  {{
    "evolutions": [
      {{
        "original_preference": "The exact original preference text",
        "evolved_preference": "The new preference text after evolution",
        "reason": "Clear explanation of why this event caused this specific change"
      }}
    ],
    "unchanged_count": <number of preferences that remained unchanged>
  }}

  CRITICAL RULES:
  - Output ONLY valid JSON, no additional text
  - "original_preference" must match EXACTLY one of the provided preferences
  - If no preferences evolve naturally, return: {{"evolutions": [], "unchanged_count": <total_count>}}
  - Every evolution must have clear causal reasoning tied to the life event
  - Do not invent preferences that weren't in the input list
  - Evolutions should feel organic and believable, never forced to meet a quota
