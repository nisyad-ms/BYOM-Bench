name: Generate Evaluation Event
description: Generates an evaluation task that tests preference recall, especially evolved preferences
used_by: persona_gym/task_generators/evaluation_task.py::_generate_evaluation_event
variables:
  - persona: The user persona description
  - preference_evolution_story: Chronological narrative of preference evolution through life events
  - required_preferences: JSON list of preferences that MUST be tested in this task
  - num_required: Total number of required preferences
  - num_evolved: Number of evolved preferences in required set
  - num_baseline: Number of baseline preferences in required set

template: |
  Generate a TASK-BASED evaluation scenario that tests an AI assistant's preference memory.

  HOW THIS TASK WILL BE USED:
  - An AI agent has gathered user preferences over multiple past conversations with the user.
  - Using those preferences, the agent must complete a specific task for the user.
  - Each conversation corresponds to a life event that may have changed/ evolved some preferences.
  - The agent is being evaluated on how well it recalls and applies the user's active preferences while completing the task.

  CRITICAL FOCUS: EVOLVED PREFERENCES  
  - The most important test is whether the agent uses CURRENT preferences vs STALE ones.
  - Preferences marked [EVOLVED] evolved from older preferences which should no longer be used.

  WHY EVOLVED PREFERENCES MATTER for EVALUATION:

  - Agent WITH poor memory -> might recall old preference (FAIL)
  - Agent WITH excellent memory -> uses current preference (PASS)

  EXAMPLE:
  "old preference": "Runs marathons, trains 5x/week"
  "evolved_preference" (after a life event): "Swims 3x/week due to knee replacement (life event: knee surgery)"

  GOOD TASK: "Plan my exercise routine for next month"
  -> Tests if agent remembers knee surgery -> recommends swimming NOT running

  BAD TASK: "What's a good protein powder?"
  -> Both agents answer equally well (doesn't test evolution)

  For your reference, here is the USER PERSONA and PREFERENCE EVOLUTION STORY.

  USER PERSONA:
  {persona}

  ===============================================================================
  PREFERENCE EVOLUTION STORY
  ===============================================================================

  {preference_evolution_story}

  ===============================================================================
  REQUIRED PREFERENCES FOR THIS TASK
  ===============================================================================

  We have randomly selected {num_required} preferences from the user's profile. Your task MUST meaningfully test ALL {num_required} of these preferences:
  - {num_evolved} are EVOLVED preferences (marked "is_evolved": true) - MOST CRITICAL
  - {num_baseline} are BASELINE preferences (unchanged)

  {required_preferences}


  ===============================================================================
  TASK REQUIREMENTS
  ===============================================================================

  1. MUST require ALL {num_required} preferences to complete well
  2. Each preference should be NECESSARY - removing it makes task incomplete
  3. Evolved preferences MUST be testable - old vs new clearly matters
  4. Task should have a CONCRETE DELIVERABLE (not vague advice)
  5. **Very Important** BE CREATIVE in task design - avoid common patterns

  GOOD TASK PATTERN EXAMPLES (not exhaustive; vary these!):
  - PLANNING: daily routines, weekly schedules, project timelines, meal plans
  - RECOMMENDATIONS: products, services, tools, resources, venues
  - DECISION SUPPORT: comparing options, prioritizing choices
  - LIFESTYLE: home setup, workspace organization, habit building
  - EVENTS: hosting, celebrations, meetings, gatherings

  BAD TASK PATTERNS:
  - "Help me with X" (too vague)
  - "Tell me about X" (informational, no personalization)
  - "What are some options?" (can list everything)
  - Tasks where only 2-3 preferences matter (must use ALL {num_required})

  ===============================================================================
  OUTPUT FORMAT (JSON)
  ===============================================================================

  {{
    "event": "Brief triggering situation (1 sentence)",
    "user_prompt": "What the user NATURALLY asks for - NO preference details",
    "task_internal": "Detailed task for JUDGE ONLY - includes what preferences should apply",
    "date": "MM/DD/YYYY"
  }}

  ===============================================================================
  CRITICAL: user_prompt vs task_internal
  ===============================================================================

  **user_prompt** is what the USER says to the agent. It MUST:
  - Be a NATURAL request without revealing any preferences
  - NOT mention dietary restrictions, health conditions, constraints, or specifics
  - Let the agent PROACTIVELY apply known preferences

  **task_internal** is for SCORING. It describes what perfect completion looks like.

  WHY THIS MATTERS:
  - Agent WITH context -> proactively applies preferences -> high score
  - Agent WITHOUT context -> gives generic advice or asks questions -> low score

  If user_prompt REVEALS preferences, even a no-context agent succeeds!

  ===============================================================================
  EXAMPLE (5 required preferences: 3 evolved, 2 baseline)
  ===============================================================================

  Required preferences:
  - "Swims 3x/week due to knee replacement" ([EVOLVED] from "runs marathons")
  - "Works remotely, flexible schedule" ([EVOLVED] from "9-5 office job")
  - "Vegetarian diet" ([EVOLVED] from "loved steakhouses")
  - "Budget: $2000/month discretionary" ([BASELINE])
  - "Lives in Seattle" ([BASELINE])

  BAD user_prompt (LEAKS PREFERENCES):
  - "Plan a wellness retreat with swimming, vegetarian meals, under $2000, near Seattle"
  - "I need a retreat - remember I can't run anymore due to my knee"

  GOOD user_prompt (NATURAL, NO LEAKS):
  - "I've had a stressful quarter and want to plan a solo wellness retreat. Can you help?"
  - "I'm thinking of taking a week off for self-care. What would you suggest?"

  Output:
  {{
    "event": "Planning a week-long solo wellness retreat after a stressful quarter",
    "user_prompt": "I've had an exhausting quarter and really need a reset. Can you help me plan a week-long solo wellness retreat?",
    "task_internal": "Create a 7-day retreat itinerary with accommodations, daily activities, and meal plans that respects: swimming-only exercise (knee), vegetarian diet, flexible timing, Seattle area, $2000 budget",
    "date": "03/20/2026"
  }}

  REMEMBER: If ANY preference can be ignored without affecting task quality, redesign the task.
  REMEMBER: user_prompt must NEVER reveal preferences - that defeats the benchmark!

