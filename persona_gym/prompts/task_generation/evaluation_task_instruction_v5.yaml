name: Generate Help Request Scenario (v5)
description: LLM selects 6 coherent preferences and generates a new situation where user seeks AI help
used_by: persona_gym/task_generators/evaluation_task.py::_generate_evaluation_event_v2
variables:
  - persona: The user persona description
  - preference_evolution_story: Preference ledger with baseline and evolution history
  - num_evolved_required: Number of evolved preferences to select (default 3)
  - num_baseline_required: Number of baseline preferences to select (default 3)
  - previous_situations: List of situations already generated (to avoid duplicates)

template: |
  You are generating a scenario where a user seeks help from an AI assistant.

  ## BACKGROUND CONTEXT

  The user has had multiple conversations with an AI assistant over time. Through these conversations, the assistant learned the user's preferences. Some preferences EVOLVED due to life changes (the old preference is now STALE and should not be used).

  Through this scenario, we want to test: Does the assistant remember and apply the user's CURRENT preferences?

  ## USER BACKGROUND

  PERSONA: 
  {persona}

  KNOWN PREFERENCES:
  {preference_evolution_story}

  ## YOUR TASK

  Create a NEW situation where this user approaches the AI assistant for help.

  ### STEP 1: Select Preferences
  
  Choose {num_evolved_required} evolved preferences and {num_baseline_required} baseline preferences that:
  - Fit naturally together in ONE coherent situation
  - Can all be meaningfully applied when helping the user
  - Include evolved preferences (critical for testing memory)

  ### STEP 2: Design the Situation

  What new situation is this user facing where they'd want AI help?

  Requirements:
  - **NEW situation**: This happens AFTER all previous life events (sessions in the preference history). It's a fresh scenario, not a continuation.
  - **User-centric**: The help directly benefits the user personally. When the user organizes something for others (party, event), their personal preferences don't naturally apply.
    - GOOD: "Design MY morning routine", "Help ME choose a laptop", "Plan MY career move"
    - BAD: "Plan a family reunion dinner" (focus shifts to accommodating others)
  - **Clear deliverable**: The user wants a plan, recommendation, decision, or advice
  - **Preferences matter**: The selected preferences should naturally influence the ideal response

  ### STEP 3: Define Ideal Response

  What would a perfect response look like? How should each preference be applied?

  ## OVERUSED SCENARIO TYPES TO AVOID - BE CREATIVE!

  Do NOT generate scenarios involving:
  - Travel, vacation, trip, getaway, relocation

    ### GOOD SCENARIO TYPES

    Instead, consider (not exhaustive; treat as inspiration):
    - Home renovation, office or workspace setup
    - Health/fitness routine planning
    - Learning a new skill or hobby
    - Career decision or job transition
    - Financial planning or major purchase
    - Family milestone - marriage, new baby, moving in with partner
    - Daily or weekly routine optimization
    - Equipment or gear selection for a hobby
    - Meal planning or dietary changes
    - DIY project planning
    - Wardrobe refresh or personal style update
    - Book/reading list curation
    - Gift selection for someone special
    - Planning a celebration or party at home
    - Setting up a new tech ecosystem (smart home, new devices)
    - Starting a side project or creative endeavor
    - Preparing for a job interview or presentation
    - Organizing personal finances or budgeting system


  ## ALREADY GENERATED BY YOU PREVIOUSLY (create something DIFFERENT)
  {previous_situations}

  ## OUTPUT FORMAT (JSON)

  {{
    "selected_preferences": [
      {{"id": "pref_XXX", "fact": "...", "is_evolved": true/false, "evolved_from": "..." or null}}
    ],
    "situation": "1-3 sentences describing what the user is facing and what help they need",
    "ideal_response": "How the assistant should apply each preference. Number each point.",
    "date": "MM/DD/YYYY"
  }}

  ## EXAMPLES

  Example 1 - Home Office Setup:
  {{
    "selected_preferences": [
      {{"id": "pref_031", "fact": "Prefers quiet environments for focus", "is_evolved": true, "evolved_from": "Loved working in busy cafes"}},
      {{"id": "pref_032", "fact": "Needs ergonomic setup due to chronic back pain", "is_evolved": true, "evolved_from": "No physical constraints"}},
      {{"id": "pref_033", "fact": "Sensitive to harsh lighting, prefers natural light", "is_evolved": true, "evolved_from": "No lighting preferences"}},
      {{"id": "pref_008", "fact": "Budget-conscious, researches thoroughly before buying", "is_evolved": false, "evolved_from": null}},
      {{"id": "pref_015", "fact": "Minimalist aesthetic preference", "is_evolved": false, "evolved_from": null}},
      {{"id": "pref_022", "fact": "Tech-savvy, enjoys smart home integration", "is_evolved": false, "evolved_from": null}}
    ],
    "situation": "The user is setting up a dedicated home office after their company announced permanent remote work. They want recommendations for furniture, layout, and equipment.",
    "ideal_response": "1. Recommend soundproofing solutions or quiet room selection (not suggesting cafe-style setups). 2. Prioritize ergonomic chair and adjustable desk for back pain. 3. Suggest desk placement near windows for natural light, recommend warm-tone bulbs. 4. Provide budget-friendly options with comparison research. 5. Recommend clean, minimalist furniture designs. 6. Include smart home ideas like automated lighting and voice-controlled devices.",
    "date": "04/20/2024"
  }}

  Example 2 - Fitness Routine Planning:
  {{
    "selected_preferences": [
      {{"id": "pref_012", "fact": "Switched to swimming due to knee surgery", "is_evolved": true, "evolved_from": "Ran 5 miles every morning"}},
      {{"id": "pref_045", "fact": "Following vegetarian diet for health reasons", "is_evolved": true, "evolved_from": "No dietary restrictions"}},
      {{"id": "pref_051", "fact": "Prefers morning workouts before 8am", "is_evolved": false, "evolved_from": null}},
      {{"id": "pref_003", "fact": "Budget of $200/month for fitness", "is_evolved": false, "evolved_from": null}},
      {{"id": "pref_019", "fact": "Prefers solo activities over group classes", "is_evolved": false, "evolved_from": null}},
      {{"id": "pref_023", "fact": "Tracks progress with apps and data", "is_evolved": false, "evolved_from": null}}
    ],
    "situation": "The user wants to create a sustainable weekly fitness routine and needs help designing a workout schedule and nutrition plan.",
    "ideal_response": "1. Build routine around swimming and low-impact exercises (no running or high-impact cardio). 2. Create vegetarian meal plan with adequate protein for recovery. 3. Schedule workouts in early morning slots before 8am. 4. Recommend gym membership or pool access within $200/month budget. 5. Focus on solo activities like lap swimming, not group fitness classes. 6. Suggest fitness tracking apps and metrics to monitor progress.",
    "date": "05/10/2024"
  }}

  Example 3 - Career Decision:
  {{
    "selected_preferences": [
      {{"id": "pref_041", "fact": "Values work-life balance over salary after burnout", "is_evolved": true, "evolved_from": "Prioritized compensation and career advancement"}},
      {{"id": "pref_042", "fact": "Prefers remote or hybrid work arrangements", "is_evolved": true, "evolved_from": "Enjoyed in-office collaboration"}},
      {{"id": "pref_007", "fact": "Lives in Seattle, prefers to stay in the area", "is_evolved": false, "evolved_from": null}},
      {{"id": "pref_018", "fact": "Values mentorship and learning opportunities", "is_evolved": false, "evolved_from": null}},
      {{"id": "pref_025", "fact": "Interested in sustainability and green tech", "is_evolved": false, "evolved_from": null}},
      {{"id": "pref_029", "fact": "Risk-averse with major life decisions", "is_evolved": false, "evolved_from": null}}
    ],
    "situation": "The user received two job offers and wants help evaluating which role is the better fit for their current life situation.",
    "ideal_response": "1. Prioritize work-life balance factors over salary differences (not pushing for highest comp). 2. Favor the role with remote/hybrid flexibility. 3. Consider Seattle-based companies or fully remote to avoid relocation. 4. Weigh mentorship culture and growth opportunities at each company. 5. Give bonus points to companies in sustainability/green tech space. 6. Recommend the safer, more stable option given risk-averse nature.",
    "date": "06/15/2024"
  }}
