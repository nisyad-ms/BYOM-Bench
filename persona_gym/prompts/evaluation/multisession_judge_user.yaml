name: Multi-Session Judge User Prompt
description: User prompt template for LLM judge with few-shot examples and dialogue to evaluate
used_by: persona_gym/evaluation/multisession.py::MultiSessionJudge
variables:
  - few_shot_examples: Formatted few-shot examples for calibration
  - current_preferences: JSON list of current active preferences
  - stale_preferences: JSON list of superseded/stale preferences
  - required_preferences: List of preference IDs that MUST be applied for this task
  - completion_criteria: How to determine if the task is complete
  - evaluation_event: Description of the evaluation scenario
  - transcript: JSON formatted dialogue transcript

template: |
  ## Few-Shot Examples for Calibration

  {few_shot_examples}

  ---

  ## Now Evaluate This Dialogue

  ### CURRENT Preferences (agent SHOULD use these):
  {current_preferences}

  ### STALE Preferences (agent should NOT use these - they've been superseded):
  {stale_preferences}

  ### REQUIRED Preferences (MUST be explicitly applied for this task):
  {required_preferences}

  **CRITICAL**: Required preferences MUST be explicitly referenced/applied by the agent. 
  If a required preference is not explicitly demonstrated, it counts as IGNORED, not NOT_APPLICABLE.

  ### Task Completion Criteria:
  {completion_criteria}

  **How to judge task completion**: The agent must produce the specific deliverable described above.
  Generic helpful advice does NOT count as task completion if a specific output was requested.

  ### Evaluation Scenario:
  {evaluation_event}

  ### Conversation Transcript:
  {transcript}

  ---

  ## Your Evaluation

  1. For each CURRENT preference, search the conversation for explicit evidence the agent proactively used it.
     - For REQUIRED preferences: must see explicit evidence or mark as IGNORED (NOT "not_applicable")
     - Generic advice that happens to align with a preference does NOT count as proactive use
  2. For each STALE preference, check if the agent incorrectly referenced or acted on it.
  3. Classify each agent turn (clarifying, productive, correction).
  4. Check if the specific task/deliverable was completed (not just "helpful advice given").

  Provide your evaluation in the following JSON format:

  ```json
  {{
      "turn_classifications": [
          {{"turn": 1, "speaker": "user|agent", "type": "productive|clarifying_question|correction|repeated_correction", "reasoning": "brief note"}},
          ...
      ],
      "current_preference_usage": {{
          "<preference_id>": {{"usage": "proactive|prompted|ignored|not_applicable", "evidence": "quote or null"}},
          ...
      }},
      "stale_preference_usage": {{
          "<preference_id>": {{"usage": "stale_used|stale_avoided", "evidence": "quote or null if avoided"}},
          ...
      }},
      "task_completed": true|false,
      "task_completion_evidence": "Quote showing specific deliverable was produced, or explanation of why not",
      "total_turns": <int>,
      "productive_turns": <int>,
      "clarifying_turns": <int>,
      "correction_turns": <int>,
      "repeated_correction_turns": <int>,
      "stale_uses": <int>,
      "efficiency_score": <float 0-1>,
      "preference_score": <float 0-1>,
      "task_success_score": <float 0-1>,
      "stale_penalty": <float>,
      "final_score": <float 0-1>,
      "reasoning": "<brief overall assessment including any stale preference issues>"
  }}
  ```

  Provide only the JSON output, no additional text.
