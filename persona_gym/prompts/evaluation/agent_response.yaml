name: Agent Response Prompt
description: Prompt to get the next agent response in the evaluation dialogue
used_by: persona_gym/evaluation_multisession/runner.py::get_agent_response
variables:
  - conversation: Formatted conversation history

template: |
  Here is the current conversation:

  {conversation}

  How do you respond as the assistant? Be helpful and personalized based on what you know about this user from previous conversations.

  Respond with just your message (no "Assistant:" prefix).
