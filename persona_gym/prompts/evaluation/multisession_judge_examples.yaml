name: Multi-Session Judge Few-Shot Examples
description: Calibration examples for evaluating preference recall with stale preference detection
used_by: persona_gym/evaluation/multisession.py::build_multisession_judge_prompt
variables:
  - none (static examples)

examples:
  # ==========================================================================
  # Example 1: EXCELLENT - Agent uses current preferences, avoids stale ones
  # ==========================================================================
  - scenario: "Meeting scheduling with evolved work preferences"
    current_preferences:
      - id: "pref_003"
        fact: "prefers afternoon meetings (2-4 PM) now that mornings are for school drop-off"
        source_session: 2
      - id: "pref_001"
        fact: "prefers video calls over phone calls"
        source_session: 0
    stale_preferences:
      - id: "pref_002"
        fact: "preferred early morning meetings (8-9 AM) because they felt most productive"
        superseded_by: "pref_003"
        reason: "Started doing school drop-offs after spouse changed jobs"
    evaluation_event: "Schedule a meeting with their financial advisor"
    transcript:
      - speaker: "user"
        content: "I need to set up a meeting with my financial advisor next week."
      - speaker: "agent"
        content: "I'll help you schedule that. Based on your current schedule, afternoon slots between 2-4 PM work best for you since mornings are for school drop-off. Should I look for video call availability in that window?"
      - speaker: "user"
        content: "Yes, that's perfect. Tuesday or Wednesday would be ideal."
      - speaker: "agent"
        tool_call: "schedule_meeting"
        params:
          time_preference: "14:00-16:00"
          days: ["Tuesday", "Wednesday"]
          format: "video_call"
      - speaker: "agent"
        content: "I found a slot on Tuesday at 2:30 PM for a video call. I've sent a calendar invite. Does that work?"
      - speaker: "user"
        content: "Perfect, thanks!"
    evaluation:
      turn_classifications:
        - turn: 1
          type: "productive"
          reasoning: "User initiates task"
        - turn: 2
          type: "productive"
          reasoning: "Agent proactively mentions BOTH current preferences (afternoon time + video calls)"
        - turn: 3
          type: "productive"
          reasoning: "User confirms"
        - turn: 4
          type: "productive"
          reasoning: "Tool call with correct parameters"
        - turn: 5
          type: "productive"
          reasoning: "Appropriate option presented"
        - turn: 6
          type: "productive"
          reasoning: "Task completed"
      current_preference_usage:
        pref_003:
          usage: "proactive"
          evidence: "afternoon slots between 2-4 PM work best for you since mornings are for school drop-off"
        pref_001:
          usage: "proactive"
          evidence: "Should I look for video call availability"
      stale_preference_usage:
        pref_002:
          usage: "stale_avoided"
          evidence: null
      task_completed: true
      total_turns: 6
      productive_turns: 6
      clarifying_turns: 0
      correction_turns: 0
      repeated_correction_turns: 0
      stale_uses: 0
      efficiency_score: 1.0
      preference_score: 1.0
      task_success_score: 1.0
      stale_penalty: 0.0
      final_score: 1.0
      reasoning: "Excellent performance. Agent proactively used both current preferences and correctly avoided the stale morning meeting preference."

  # ==========================================================================
  # Example 2: POOR - Agent uses stale preference, gets corrected
  # ==========================================================================
  - scenario: "Dinner recommendation with evolved dietary preference"
    current_preferences:
      - id: "pref_004"
        fact: "now eats fish and seafood (pescatarian) after doctor's recommendation"
        source_session: 1
      - id: "pref_001"
        fact: "prefers quiet restaurants with good ambiance"
        source_session: 0
    stale_preferences:
      - id: "pref_002"
        fact: "was strictly vegetarian for ethical reasons"
        superseded_by: "pref_004"
        reason: "Doctor recommended adding fish for omega-3s after health checkup"
    evaluation_event: "Find a restaurant for anniversary dinner"
    transcript:
      - speaker: "user"
        content: "I need a nice restaurant for our anniversary dinner this Saturday."
      - speaker: "agent"
        content: "I'll find a great spot for your anniversary! Since you're vegetarian, I'll look for places with excellent vegetarian menus and quiet ambiance."
      - speaker: "user"
        content: "Actually, I've started eating fish now - my doctor recommended it. So pescatarian options work too."
      - speaker: "agent"
        content: "Oh, that's good to know! Let me search for places with great seafood or vegetarian options in a quiet setting."
      - speaker: "agent"
        tool_call: "search_restaurants"
        params:
          dietary: ["pescatarian", "vegetarian"]
          ambiance: "quiet"
          occasion: "anniversary"
      - speaker: "agent"
        content: "I found The Seaside Table - they have an excellent chef's seafood tasting menu and a quiet, romantic atmosphere. It has great reviews for special occasions. Shall I book it?"
      - speaker: "user"
        content: "That sounds perfect, please book it for 7 PM."
    evaluation:
      turn_classifications:
        - turn: 1
          type: "productive"
          reasoning: "User initiates task"
        - turn: 2
          type: "correction"
          reasoning: "Agent uses STALE vegetarian preference instead of current pescatarian"
        - turn: 3
          type: "correction"
          reasoning: "User must correct the agent about dietary change"
        - turn: 4
          type: "productive"
          reasoning: "Agent acknowledges and corrects"
        - turn: 5
          type: "productive"
          reasoning: "Correct search with updated dietary preference"
        - turn: 6
          type: "productive"
          reasoning: "Good recommendation"
        - turn: 7
          type: "productive"
          reasoning: "Task completed"
      current_preference_usage:
        pref_004:
          usage: "prompted"
          evidence: "Only used after user corrected them"
        pref_001:
          usage: "proactive"
          evidence: "quiet ambiance"
      stale_preference_usage:
        pref_002:
          usage: "stale_used"
          evidence: "Since you're vegetarian"
      task_completed: true
      total_turns: 7
      productive_turns: 5
      clarifying_turns: 0
      correction_turns: 1
      repeated_correction_turns: 0
      stale_uses: 1
      efficiency_score: 0.75
      preference_score: 0.75
      task_success_score: 1.0
      stale_penalty: 0.3
      final_score: 0.53
      reasoning: "Task completed but agent used stale vegetarian preference, requiring correction. One stale preference use incurs 0.3 penalty. Agent did proactively use the quiet ambiance preference."

  # ==========================================================================
  # Example 3: VERY POOR - Agent uses stale preference repeatedly
  # ==========================================================================
  - scenario: "Commute planning with evolved transportation preference"
    current_preferences:
      - id: "pref_003"
        fact: "now drives to work after moving to suburbs"
        source_session: 2
      - id: "pref_001"
        fact: "prefers to arrive 15 minutes early to meetings"
        source_session: 0
    stale_preferences:
      - id: "pref_002"
        fact: "took the subway to work, preferred express trains"
        superseded_by: "pref_003"
        reason: "Moved from downtown apartment to suburban house"
    evaluation_event: "Plan route to important client meeting downtown"
    transcript:
      - speaker: "user"
        content: "I have a client meeting at 10 AM downtown tomorrow. Can you help me plan my route?"
      - speaker: "agent"
        content: "Sure! I'll check the subway schedule. The express train would get you there fastest - there's one at 9:15 AM that arrives at 9:40 AM, giving you time to spare."
      - speaker: "user"
        content: "I drive now - I moved to the suburbs, remember?"
      - speaker: "agent"
        content: "Oh right, sorry about that! Let me check driving routes. Actually, with traffic, driving might take longer. Are you sure you don't want to take the train? The express is really convenient."
      - speaker: "user"
        content: "I'm not near a train station anymore. I need driving directions please."
      - speaker: "agent"
        content: "Of course, my apologies. Let me calculate the driving route accounting for morning traffic."
      - speaker: "agent"
        tool_call: "get_directions"
        params:
          mode: "driving"
          arrival_time: "09:45"
          account_for_traffic: true
      - speaker: "agent"
        content: "With typical traffic, you should leave by 8:45 AM to arrive by 9:45 AM, giving you your preferred 15-minute buffer."
      - speaker: "user"
        content: "Finally. Thank you."
    evaluation:
      turn_classifications:
        - turn: 1
          type: "productive"
          reasoning: "User initiates task"
        - turn: 2
          type: "correction"
          reasoning: "Agent uses STALE subway preference"
        - turn: 3
          type: "correction"
          reasoning: "User corrects about driving"
        - turn: 4
          type: "repeated_correction"
          reasoning: "Agent STILL suggests subway after being corrected"
        - turn: 5
          type: "correction"
          reasoning: "User has to insist again"
        - turn: 6
          type: "productive"
          reasoning: "Agent finally acknowledges"
        - turn: 7
          type: "productive"
          reasoning: "Correct search"
        - turn: 8
          type: "productive"
          reasoning: "Good recommendation with early arrival buffer"
        - turn: 9
          type: "productive"
          reasoning: "Task completed with user frustration"
      current_preference_usage:
        pref_003:
          usage: "ignored"
          evidence: "Only acknowledged after repeated corrections, then still suggested train"
        pref_001:
          usage: "proactive"
          evidence: "15-minute buffer"
      stale_preference_usage:
        pref_002:
          usage: "stale_used"
          evidence: "express train would get you there fastest"
      task_completed: true
      total_turns: 9
      productive_turns: 5
      clarifying_turns: 0
      correction_turns: 2
      repeated_correction_turns: 1
      stale_uses: 1
      efficiency_score: 0.0
      preference_score: 0.5
      task_success_score: 1.0
      stale_penalty: 0.3
      final_score: 0.20
      reasoning: "Very poor performance. Agent used stale subway preference and even CONTINUED suggesting it after being corrected (repeated_correction triggers efficiency=0). Stale penalty also applied. Agent did eventually complete task and proactively used the 15-minute buffer preference."

  # ==========================================================================
  # Example 4: MEDIOCRE - Agent lacks context, asks clarifying questions
  # ==========================================================================
  - scenario: "Course recommendation without preference context"
    current_preferences:
      - id: "pref_001"
        fact: "prefers hands-on, project-based learning over lectures"
        source_session: 0
      - id: "pref_002"
        fact: "has limited budget, prefers free or low-cost resources"
        source_session: 0
      - id: "pref_003"
        fact: "learns best in evening sessions after work"
        source_session: 1
    stale_preferences: []
    evaluation_event: "Find a course to learn Python programming"
    transcript:
      - speaker: "user"
        content: "I want to learn Python. Can you recommend a good course?"
      - speaker: "agent"
        content: "I'd be happy to help you find a Python course! To give you the best recommendation, could you tell me: Do you prefer video lectures, reading materials, or hands-on projects?"
      - speaker: "user"
        content: "I learn best with hands-on projects."
      - speaker: "agent"
        content: "Great, project-based learning it is! What's your budget for this? Are you looking for free resources or are you open to paid courses?"
      - speaker: "user"
        content: "I'd prefer free or low-cost options if possible."
      - speaker: "agent"
        content: "Perfect. And one more question - what time of day works best for you to study?"
      - speaker: "user"
        content: "Usually evenings after work."
      - speaker: "agent"
        content: "Based on your preferences, I recommend freeCodeCamp's Python curriculum and Codecademy's free Python track. Both are project-based with flexible evening-friendly schedules."
      - speaker: "user"
        content: "Thanks, I'll check those out!"
    evaluation:
      turn_classifications:
        - turn: 1
          type: "productive"
          reasoning: "User initiates task"
        - turn: 2
          type: "clarifying_question"
          reasoning: "Agent asks about learning style - should have known from pref_001"
        - turn: 3
          type: "productive"
          reasoning: "User provides info"
        - turn: 4
          type: "clarifying_question"
          reasoning: "Agent asks about budget - should have known from pref_002"
        - turn: 5
          type: "productive"
          reasoning: "User provides info"
        - turn: 6
          type: "clarifying_question"
          reasoning: "Agent asks about schedule - should have known from pref_003"
        - turn: 7
          type: "productive"
          reasoning: "User provides info"
        - turn: 8
          type: "productive"
          reasoning: "Good recommendation matching all preferences"
        - turn: 9
          type: "productive"
          reasoning: "Task completed"
      current_preference_usage:
        pref_001:
          usage: "prompted"
          evidence: "Only used after asking user about learning style"
        pref_002:
          usage: "prompted"
          evidence: "Only used after asking user about budget"
        pref_003:
          usage: "prompted"
          evidence: "Only used after asking user about schedule"
      stale_preference_usage: {}
      task_completed: true
      total_turns: 9
      productive_turns: 6
      clarifying_turns: 3
      correction_turns: 0
      repeated_correction_turns: 0
      stale_uses: 0
      efficiency_score: 0.55
      preference_score: 0.5
      task_success_score: 1.0
      stale_penalty: 0.0
      final_score: 0.68
      reasoning: "Task completed but agent had to ask 3 clarifying questions about preferences it should have known. No errors or corrections, but inefficient. Efficiency = 1.0 - (3 * 0.15) = 0.55. Preference score is 0.5 because all preferences were prompted, not proactive."
