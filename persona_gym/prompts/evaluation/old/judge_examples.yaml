name: Multi-Session Judge Few-Shot Examples
description: Calibration examples for evaluating preference recall with stale preference detection
used_by: persona_gym/evaluation/multisession.py::build_multisession_judge_prompt
variables:
  - none (static examples)

# Scoring formulas (for reference):
# - preference_score = max(0, (proactive_count - stale_count) / total_required)
# - efficiency_score = max(0, (agent_turns - 0.5 * clarifying_turns - correction_turns) / agent_turns)
#   - If any repeated_correction: efficiency = 0
# - final_score = 0.5 * preference_score + 0.5 * efficiency_score
# NOTE: Only AGENT turns are classified and scored. User turns are not evaluated.

examples:
  # ==========================================================================
  # Example 1: EXCELLENT - Agent uses current preferences, avoids stale ones
  # ==========================================================================
  - scenario: "Meeting scheduling with evolved work preferences"
    agent_turns: 2
    required_preferences:
      - id: "pref_003"
        fact: "prefers afternoon meetings (2-4 PM) now that mornings are for school drop-off"
        supersedes:
          id: "pref_002"
          fact: "preferred early morning meetings (8-9 AM) because they felt most productive"
      - id: "pref_001"
        fact: "prefers video calls over phone calls"
    evaluation_event: "Schedule a meeting with their financial advisor"
    transcript:
      - speaker: "user"
        content: "I need to set up a meeting with my financial advisor next week."
      - speaker: "agent"
        content: "I'll help you schedule that. Based on your current schedule, afternoon slots between 2-4 PM work best for you since mornings are for school drop-off. Should I look for video call availability in that window?"
      - speaker: "user"
        content: "Yes, that's perfect. Tuesday or Wednesday would be ideal."
      - speaker: "agent"
        content: "I found a slot on Tuesday at 2:30 PM for a video call. I've sent a calendar invite. Does that work?"
      - speaker: "user"
        content: "Perfect, thanks!"
    evaluation:
      turn_classifications:
        - turn: 1
          type: "productive"
          reasoning: "Agent proactively mentions BOTH current preferences (afternoon time + video calls)"
        - turn: 2
          type: "productive"
          reasoning: "Agent presents appropriate option matching preferences"
      required_preference_usage:
        pref_003:
          usage: "proactive"
          stale_used: false
          evidence: "afternoon slots between 2-4 PM work best for you since mornings are for school drop-off"
        pref_001:
          usage: "proactive"
          stale_used: false
          evidence: "Should I look for video call availability"
      total_turns: 2
      productive_turns: 2
      clarifying_turns: 0
      correction_turns: 0
      ignored_turns: 0
      repeated_correction_turns: 0
      stale_count: 0
      proactive_count: 2
      efficiency_score: 1.0
      preference_score: 1.0
      final_score: 1.0
      reasoning: "Excellent performance. Agent proactively used both current preferences and correctly avoided the stale morning meeting preference."

  # ==========================================================================
  # Example 2: POOR - Agent uses stale preference, gets corrected
  # ==========================================================================
  - scenario: "Dinner recommendation with evolved dietary preference"
    agent_turns: 3
    required_preferences:
      - id: "pref_004"
        fact: "now eats fish and seafood (pescatarian) after doctor's recommendation"
        supersedes:
          id: "pref_002"
          fact: "was strictly vegetarian for ethical reasons"
      - id: "pref_001"
        fact: "prefers quiet restaurants with good ambiance"
    evaluation_event: "Find a restaurant for anniversary dinner"
    transcript:
      - speaker: "user"
        content: "I need a nice restaurant for our anniversary dinner this Saturday."
      - speaker: "agent"
        content: "I'll find a great spot for your anniversary! Since you're vegetarian, I'll look for places with excellent vegetarian menus and quiet ambiance."
      - speaker: "user"
        content: "Actually, I've started eating fish now - my doctor recommended it. So pescatarian options work too."
      - speaker: "agent"
        content: "Oh, that's good to know! Let me search for places with great seafood options in a quiet setting."
      - speaker: "agent"
        content: "I found The Seaside Table - they have an excellent chef's seafood tasting menu and a quiet, romantic atmosphere. Shall I book it?"
      - speaker: "user"
        content: "That sounds perfect, please book it for 7 PM."
    evaluation:
      turn_classifications:
        - turn: 1
          type: "correction"
          reasoning: "Agent uses STALE vegetarian preference instead of current pescatarian"
        - turn: 2
          type: "productive"
          reasoning: "Agent acknowledges and updates search"
        - turn: 3
          type: "productive"
          reasoning: "Good recommendation with seafood and quiet ambiance"
      required_preference_usage:
        pref_004:
          usage: "ignored"
          stale_used: true
          evidence: "Agent said 'Since you're vegetarian' - used outdated preference"
        pref_001:
          usage: "proactive"
          stale_used: false
          evidence: "quiet ambiance"
      total_turns: 3
      productive_turns: 2
      clarifying_turns: 0
      correction_turns: 1
      ignored_turns: 0
      repeated_correction_turns: 0
      stale_count: 1
      proactive_count: 1
      efficiency_score: 0.67
      preference_score: 0.0
      final_score: 0.34
      reasoning: "Agent used stale vegetarian preference (now pescatarian), requiring correction. efficiency = (3-0-1)/3 = 0.67. preference_score = max(0, (1-1)/2) = 0. final_score = 0.5*0 + 0.5*0.67 = 0.34. Agent proactively used quiet ambiance but failed to recall current dietary preference."

  # ==========================================================================
  # Example 3: VERY POOR - Agent uses stale preference repeatedly
  # ==========================================================================
  - scenario: "Commute planning with evolved transportation preference"
    agent_turns: 3
    required_preferences:
      - id: "pref_003"
        fact: "now drives to work after moving to suburbs"
        supersedes:
          id: "pref_002"
          fact: "took the subway to work, preferred express trains"
      - id: "pref_001"
        fact: "prefers to arrive 15 minutes early to meetings"
    evaluation_event: "Plan route to important client meeting downtown"
    transcript:
      - speaker: "user"
        content: "I have a client meeting at 10 AM downtown tomorrow. Can you help me plan my route?"
      - speaker: "agent"
        content: "Sure! I'll check the subway schedule. The express train would get you there fastest - there's one at 9:15 AM that arrives at 9:40 AM."
      - speaker: "user"
        content: "I drive now - I moved to the suburbs, remember?"
      - speaker: "agent"
        content: "Oh right, sorry! Let me check driving routes. Actually, with traffic, driving might take longer. Are you sure you don't want to take the train?"
      - speaker: "user"
        content: "I'm not near a train station anymore. I need driving directions please."
      - speaker: "agent"
        content: "Of course, my apologies. With typical traffic, you should leave by 8:45 AM to arrive by 9:45 AM, giving you your preferred 15-minute buffer."
      - speaker: "user"
        content: "Finally. Thank you."
    evaluation:
      turn_classifications:
        - turn: 1
          type: "correction"
          reasoning: "Agent uses STALE subway preference"
        - turn: 2
          type: "repeated_correction"
          reasoning: "Agent STILL suggests subway after being corrected"
        - turn: 3
          type: "productive"
          reasoning: "Agent finally provides driving directions with 15-min buffer"
      required_preference_usage:
        pref_003:
          usage: "ignored"
          stale_used: true
          evidence: "Agent suggested subway/express train - used outdated preference"
        pref_001:
          usage: "proactive"
          stale_used: false
          evidence: "15-minute buffer"
      total_turns: 3
      productive_turns: 1
      clarifying_turns: 0
      correction_turns: 1
      ignored_turns: 0
      repeated_correction_turns: 1
      stale_count: 1
      proactive_count: 1
      efficiency_score: 0.0
      preference_score: 0.0
      final_score: 0.0
      reasoning: "Very poor performance. Agent used stale subway preference and CONTINUED suggesting it after being corrected (repeated_correction → efficiency=0). preference_score = max(0, (1-1)/2) = 0. final_score = 0.5*0 + 0.5*0 = 0. Agent did proactively use the 15-minute buffer."

  # ==========================================================================
  # Example 4: MEDIOCRE - Agent lacks context, asks clarifying questions
  # ==========================================================================
  - scenario: "Course recommendation without preference context"
    agent_turns: 4
    required_preferences:
      - id: "pref_001"
        fact: "prefers hands-on, project-based learning over lectures"
      - id: "pref_002"
        fact: "has limited budget, prefers free or low-cost resources"
      - id: "pref_003"
        fact: "learns best in evening sessions after work"
    evaluation_event: "Find a course to learn Python programming"
    transcript:
      - speaker: "user"
        content: "I want to learn Python. Can you recommend a good course?"
      - speaker: "agent"
        content: "I'd be happy to help! Do you prefer video lectures, reading materials, or hands-on projects?"
      - speaker: "user"
        content: "I learn best with hands-on projects."
      - speaker: "agent"
        content: "Great! What's your budget? Are you looking for free resources or open to paid courses?"
      - speaker: "user"
        content: "I'd prefer free or low-cost options if possible."
      - speaker: "agent"
        content: "And what time of day works best for you to study?"
      - speaker: "user"
        content: "Usually evenings after work."
      - speaker: "agent"
        content: "Based on your preferences, I recommend freeCodeCamp's Python curriculum - it's free, project-based, and self-paced for evening study."
      - speaker: "user"
        content: "Thanks, I'll check it out!"
    evaluation:
      turn_classifications:
        - turn: 1
          type: "clarifying_question"
          reasoning: "Agent asks about learning style - should have known from pref_001"
        - turn: 2
          type: "clarifying_question"
          reasoning: "Agent asks about budget - should have known from pref_002"
        - turn: 3
          type: "clarifying_question"
          reasoning: "Agent asks about schedule - should have known from pref_003"
        - turn: 4
          type: "productive"
          reasoning: "Good recommendation matching all preferences"
      required_preference_usage:
        pref_001:
          usage: "ignored"
          stale_used: false
          evidence: "Agent did not proactively recall - had to ask about learning style"
        pref_002:
          usage: "ignored"
          stale_used: false
          evidence: "Agent did not proactively recall - had to ask about budget"
        pref_003:
          usage: "ignored"
          stale_used: false
          evidence: "Agent did not proactively recall - had to ask about schedule"
      total_turns: 4
      productive_turns: 1
      clarifying_turns: 3
      correction_turns: 0
      ignored_turns: 0
      repeated_correction_turns: 0
      stale_count: 0
      proactive_count: 0
      efficiency_score: 0.625
      preference_score: 0.0
      final_score: 0.31
      reasoning: "Agent had to ask 3 clarifying questions about preferences it should have known. efficiency = (4 - 0.5*3 - 0)/4 = 0.625. No stale errors, but agent failed to proactively recall ANY preferences - all were only used after user provided the info. preference_score = 0/3 = 0. final_score = 0.5*0 + 0.5*0.625 = 0.31."
  # ==========================================================================
  # Example 5: MEDIOCRE - User reveals preferences naturally, agent adapts
  # This demonstrates the FIRST-MENTION RULE: if user reveals preference first,
  # even via natural conversation (not correction), it's IGNORED.
  # ==========================================================================
  - scenario: "Trip planning where user reveals preferences during conversation"
    agent_turns: 4
    required_preferences:
      - id: "pref_001"
        fact: "prefers staying in camper van or campgrounds rather than hotels"
      - id: "pref_002"
        fact: "avoids air travel entirely, relies on ground transportation"
      - id: "pref_003"
        fact: "documents trips through blog posts and video journals"
    evaluation_event: "Plan a family road trip to Oregon"
    transcript:
      - speaker: "user"
        content: "Can you help me plan a family trip to Oregon this summer?"
      - speaker: "agent"
        content: "I'd love to help! Here's a 7-day Oregon itinerary: Day 1-2 Portland, Day 3-4 Crater Lake, Day 5-7 Coast. I'd suggest flying into Portland and staying at the Kimpton Hotel downtown."
      - speaker: "user"
        content: "Great route! But we actually travel in our camper van and prefer campgrounds over hotels. Can you suggest campgrounds instead?"
      - speaker: "agent"
        content: "Absolutely! Here are campground options: Portland - Oxbow Regional Park, Crater Lake - Mazama Campground, Coast - Cape Lookout State Park. All have van-friendly sites."
      - speaker: "user"
        content: "Perfect! Also, we don't fly - we'll be driving from Seattle. Any scenic route suggestions?"
      - speaker: "agent"
        content: "Great choice! Take I-5 south through the Willamette Valley, or Highway 101 along the coast for more scenic views. Both are beautiful drives."
      - speaker: "user"
        content: "The coastal route sounds perfect for our travel blog and videos. Thanks!"
      - speaker: "agent"
        content: "You're welcome! The coast will give you amazing content - dramatic cliffs, beaches, and small towns. Safe travels!"
    evaluation:
      turn_classifications:
        - turn: 1
          type: "correction"
          reasoning: "Agent suggested hotels and flying - user had to correct with camper van preference"
        - turn: 2
          type: "productive"
          reasoning: "Agent provides campground options after being told"
        - turn: 3
          type: "productive"
          reasoning: "Agent provides driving routes after user revealed no-fly preference"
        - turn: 4
          type: "productive"
          reasoning: "Agent responds to user mentioning blog/videos"
      required_preference_usage:
        pref_001:
          usage: "ignored"
          stale_used: false
          evidence: "User revealed preference first: 'we actually travel in our camper van and prefer campgrounds over hotels'"
        pref_002:
          usage: "ignored"
          stale_used: false
          evidence: "User revealed preference first: 'we don't fly - we'll be driving from Seattle'"
        pref_003:
          usage: "ignored"
          stale_used: false
          evidence: "User revealed preference first: 'for our travel blog and videos'"
      total_turns: 4
      productive_turns: 3
      clarifying_turns: 0
      correction_turns: 1
      ignored_turns: 0
      repeated_correction_turns: 0
      stale_count: 0
      proactive_count: 0
      efficiency_score: 0.75
      preference_score: 0.0
      final_score: 0.38
      reasoning: "CRITICAL: All preferences scored IGNORED because USER mentioned them first. Even though agent adapted well after learning each preference, the agent did not RECALL them - they were TOLD. First-mention rule: pref_001 revealed by user in turn 2, pref_002 revealed by user in turn 3, pref_003 revealed by user in turn 4. Agent demonstrated zero preference memory. efficiency = (4-0-1)/4 = 0.75. final_score = 0.5*0 + 0.5*0.75 = 0.38."