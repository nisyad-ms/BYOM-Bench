name: Multi-Session User Simulator Respond Prompt
description: User prompt for generating the next user response in evaluation dialogue
used_by: persona_gym/evaluation_multisession/user_simulator.py::respond
variables:
  - conversation: Formatted conversation so far
  - agent_message: The assistant's last message to respond to

template: |
  Continue the dialogue as the user.

  ## Conversation so far:
  {conversation}

  ## Assistant's last message:
  "{agent_message}"

  Generate your response as the user. Follow the rules from your system prompt.
