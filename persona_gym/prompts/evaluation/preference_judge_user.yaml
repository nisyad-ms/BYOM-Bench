name: Preference Judge User Prompt
description: User prompt providing data for preference recall scoring
used_by: persona_gym/evaluation_multisession/judge.py::MultiSessionJudge
variables:
  - required_preferences: List of required preferences with optional supersedes info
  - transcript: JSON formatted dialogue transcript
  - num_required: Number of required preferences

template: |
  ## Required Preferences
  {required_preferences}

  ## Conversation Transcript
  {transcript}

  Total required preferences: {num_required}

  Analyze first-mentions and calculate preference score. Output JSON only.
